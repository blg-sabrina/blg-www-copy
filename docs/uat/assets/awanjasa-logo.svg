<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric AI-inspired icon with gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brain/Network icon representing AI -->
  <circle cx="30" cy="30" r="8" fill="#8b5cf6"/>
  <circle cx="18" cy="20" r="5" fill="#6366f1"/>
  <circle cx="42" cy="20" r="5" fill="#6366f1"/>
  <circle cx="18" cy="40" r="5" fill="#3b82f6"/>
  <circle cx="42" cy="40" r="5" fill="#3b82f6"/>

  <!-- Connection lines -->
  <line x1="30" y1="30" x2="18" y2="20" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="42" y2="20" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="18" y2="40" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="30" x2="42" y2="40" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Text -->
  <text x="65" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#grad1)">
    Awanjasa
  </text>
</svg>
