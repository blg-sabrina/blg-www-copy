# Arabic overlay for data/solution_features.yaml (name/desc only;
# icon/badge/link stay in the base file). Missing entries fall back to English.

add-modules-without-migration:
  name: "أضف وحدات دون ترحيل"
  desc: "لأن الوحدات تشترك في بنية التطبيقات نفسها، فإن إضافة وحدة جديدة هي مجرد تثبيت وليست تغيير منصة — المسار الموصى به هو النمو التدريجي والتنفيذ على مراحل بدلًا من إطلاق شامل دفعة واحدة."
advanced-reporting-bi:
  name: "تقارير متقدمة وذكاء أعمال"
  desc: "منشئ تقارير مرن يغطي التقارير المخصصة والمقارنة بين الفترات، مدعومًا بتحليلات لوحات معلومات فورية — مع تطبيق ذكاء أعمال مخصص متاح لمستودعات البيانات والنمذجة التنبؤية على مستوى المؤسسات."
api-webhook-access:
  name: "وصول API وWebhook"
  desc: "تأتي REST API مع حزم SDK لـ JS/TS وPython وPHP وJava و.NET وGo، بحد 1,000 طلب/ساعة في الخطط القياسية وحدود أعلى للمؤسسات. تغطي Webhooks أكثر من 200 نوع حدث حتى 10,000 حدث/ثانية بضمان تسليم 99.9٪."
appointment-scheduling-reminders:
  name: "جدولة المواعيد والتذكيرات"
  desc: "حجز المواعيد وطلبات إعادة صرف الوصفات والتذكيرات الصحية تعمل عبر تطبيق المراسلة متعدد القنوات في المنصة، مع تكامل التقويم وتوجيه أولوية للحالات العاجلة."
audit-trail-every-transaction:
  name: "سجل تدقيق لكل معاملة"
  desc: "كل معاملة تحمل سجل تدقيق كاملًا افتراضيًا، مع وصول قائم على الأدوار وتدفقات اعتماد متعددة المستويات — تسجيل النشاط والاحتفاظ بالتدقيق قابلان للتهيئة حتى 7 سنوات."
automated-bank-reconciliation:
  name: "تسوية بنكية آلية"
  desc: "تسوية كشوف البنك تعمل تلقائيًا مقابل استيراد الكشوف اليومية بدلًا من المطابقة اليدوية الشهرية — بُني دفتر الصندوق حول هذه الوظيفة كوظيفة أساسية."
automated-order-routing:
  name: "توجيه الطلبات تلقائيًا"
  desc: "تُوجَّه الطلبات إلى المورد الأمثل تلقائيًا — اختيار مدعوم بالذكاء الاصطناعي يوازن التكلفة والموقع والتوافر والأداء، ويمكن للطلب الواحد أن ينقسم تلقائيًا على عدة موردين عند الحاجة."
automated-payroll-statutory-filing:
  name: "رواتب وتقديم قانوني آلي"
  desc: "تمر الرواتب بدورة محددة — الحضور، الحساب، الاعتماد، الدفع، التقارير — مع حساب ضريبة الدخل والاستقطاعات القانونية (EPF، SOCSO) تلقائيًا في خطوة الحساب."
b2b-customer-portal:
  name: "بوابة عملاء B2B"
  desc: "تطبيق بوابة B2B مخصص يمنح عملاء الجملة أسعارًا خاصة بهم، ومعالجة طلبات بالجملة، وإدارة حدود ائتمان، وكتالوجات مخصصة — طلبات ذاتية الخدمة، لا استقبال طلبات بالهاتف والبريد."
basic-to-advanced-module-path:
  name: "مسار من الوحدات الأساسية إلى المتقدمة"
bill-of-materials-bom:
  name: "قائمة المواد (BOM)"
  desc: "قوائم المواد تحمل إصدارات كاملة مع إدارة التغييرات الهندسية، والتكلفة تُجمَّع قياسية وفعلية معًا — فلا تكسر مراجعة القائمة خط أساس التكلفة بصمت."
bundle-kitting-support:
  name: "دعم الحزم والتجميعات"
  desc: "منتجات الحزم والتجميعات تهيئة منتج من الدرجة الأولى وليست حلًا التفافيًا — عمليات التجميع المعقدة وتحزيم المنتجات مدعومة صراحة."
cash-flow-forecasting:
  name: "توقعات التدفق النقدي"
  desc: "يتتبع دفتر الصندوق المركز النقدي لحظيًا كوظيفة أساسية، مع تقارير مخصصة لتوقع وتحليل التدفق النقدي — القدرة نفسها التي تبرزها المنصة لشركات الخدمات ذات الدخل غير المنتظم."
centralized-pricing-promotions:
  name: "تسعير وعروض مركزية"
  desc: "العروض على مستوى السلسلة ميزة معلنة في إعداد السلاسل متعددة المتاجر، ودفتر الأسعار يهيئ العروض والحملات حسب الشريحة أو العميل أو الكيان أو الفترة عبر كل الفروع دفعة واحدة."
claim-cycle-tracking:
  name: "تتبع دورة المطالبات"
client-billing-invoicing:
  name: "فوترة العملاء"
  desc: "حوّل الوقت والمصاريف المسجلة مباشرة إلى فواتير عملاء — دون إعادة إدخال. يدعم فوترة المراحل والدفعات المقدمة وتقديم الفاتورة الإلكترونية الماليزية/LHDN في التدفق نفسه."
co-marketing-opportunities:
  name: "فرص تسويق مشترك"
combined-finance-operations-modules:
  name: "وحدات مالية وتشغيلية معًا"
commission-schemes:
  name: "خطط العمولات"
commission-tracking:
  name: "تتبع العمولات"
  desc: "تُحسب حوافز المبيعات تلقائيًا من بيانات الصفقات نفسها في خط المبيعات، مع تخزين هيكل العمولة (مثل 3٪ من المبيعات) مباشرة في سجل تعويضات الموظف."
compliance-update-tracking:
  name: "تتبع تحديثات الامتثال"
  desc: "معدلات وقواعد الضرائب تحمل تواريخ سريان، فتُجدول التغييرات التنظيمية (كتعديل معدل SST) مسبقًا بدل ترقيعها عند الموعد النهائي. تقويم امتثال يتتبع مواعيد التقديم مع مراقبة وتنبيهات."
configurable-approval-workflows:
  name: "تدفقات اعتماد قابلة للتهيئة"
  desc: "تتبع المطالبات مسار الاعتماد نفسه المستخدم عبر الموارد البشرية — طلب، اعتماد المدير، مراجعة الموارد البشرية — بدلًا من عملية موازية منفصلة."
configuration-training:
  name: "التهيئة والتدريب"
consolidated-group-reporting:
  name: "تقارير مجموعة موحدة"
  desc: "تطبيق معالجة توحيد مخصص يجمع البيانات المالية على مستوى الكيان في تقارير المجموعة، معتمدًا على هيكل الأم والتابع نفسه المحدد في إعداد مؤسستك."
consolidated-reporting-franchise:
  name: "تقارير موحدة"
  desc: "التوحيد المالي متعدد الكيانات وتحليلات الأداء عبر المستأجرين يتوسعان حتى 100 تسلسل توحيد، مولّدين تقارير على مستوى المؤسسة في دقائق — مع مراقبة أداء أصحاب الامتياز كحالة استخدام معلنة."
core-accounting-einvoice-day-one:
  name: "محاسبة أساسية + فاتورة إلكترونية من اليوم الأول"
  desc: "المحاسبة المالية تأتي بامتثال GST/SST وحساب ضرائب آلي مدمجين، والفوترة الإلكترونية الحكومية جزء من الوحدة نفسها — لا شراء منفصل تضيفه لاحقًا."
crm-pipeline-tracking:
  name: "CRM وتتبع خط المبيعات"
  desc: "تتبع العملاء المحتملين عبر خط من 5 مراحل (استكشاف → تأهيل → عرض → تفاوض → إتمام) مع تقييم مدمج، فتعرف الفرق أي الفرص تستحق الأولوية قبل الالتزام بالموارد."
cross-outlet-redemption:
  name: "استبدال عبر الفروع"
  desc: "تعمل العضوية على أساس نقاط البيع متعدد الفروع نفسه المستخدم للمخزون المركزي، فلا تُحبس نقاط العضو في الفرع الذي كسبها فيه."
custom-slas-security-review:
  name: "اتفاقيات مستوى مخصصة ومراجعة أمنية"
  desc: "تعمل عمليات نشر المؤسسات على هدف التوافر 99.9٪ نفسه مع إدارة وصول مميز ووصول طوارئ فوقها — مضافة إلى المصادقة متعددة العوامل وRBAC والتشفير."
data-migration-assistance:
  name: "مساعدة في ترحيل البيانات"
data-migration-quickbooks:
  name: "ترحيل بيانات من QuickBooks"
data-migration-services:
  name: "خدمات ترحيل البيانات"
data-residency-policy:
  name: "سياسة موطن البيانات"
  desc: "ضوابط الموطن والسيادة الجغرافية للبيانات تتيح للنشر الخاضع للتنظيم إبقاء البيانات ضمن المنطقة المطلوبة، بدعم أطر امتثال محلية للطرح الإقليمي بدلًا من إعداد عالمي موحد."
dedicated-account-support:
  name: "دعم حساب مخصص"
  desc: "تحصل تطبيقات المؤسسات على فريق مشروع مخصص وإدارة نجاح عملاء مستمرة، بدعم فني 24/7 للمشكلات الحرجة ومراجعات صحية دورية بدل طابور دعم مشترك."
dedicated-onboarding-specialist:
  name: "أخصائي تهيئة مخصص"
dedicated-partner-support:
  name: "دعم شركاء مخصص"
delivery-route-optimization:
  name: "تحسين مسارات التوصيل"
  desc: "سجلات العملاء تحمل إحداثيات GPS خصيصًا لتحسين المسارات، إلى جانب مناطق التوصيل والتفضيلات وتعيين نطاقات الخدمة — فالتوجيه ليس خطوة تخطيط يدوية منفصلة."
digital-claim-submission:
  name: "تقديم مطالبات رقمي"
dropship-specific-reporting:
  name: "تقارير خاصة بالشحن المباشر"
  desc: "مؤشرات أداء مصممة لما يهم فعلًا في الشحن المباشر — زمن معالجة الطلب، دقة التنفيذ، معدل التسليم في الموعد، درجة موثوقية المورد المركبة، هامش الربح لكل طلب، ومعدل الإرجاع."
einvoice-lhdn-submission:
  name: "تقديم الفاتورة الإلكترونية/LHDN"
  desc: "تُقدَّم الفواتير مباشرة إلى LHDN عبر تكامل API مع تحقق فوري وإعادة محاولة تلقائية ومعالجة بالجملة — وفق جدول MyInvois الماليزي المرحلي (إيرادات >100 مليون رينغيت من أغسطس 2024، >25 مليونًا من يناير 2025، وكل الشركات بحلول يوليو 2025)."
employee-self-service-portal:
  name: "بوابة الخدمة الذاتية للموظفين"
  desc: "يحدّث الموظفون بياناتهم ويقدمون طلبات الإجازة مباشرة، وللمديرين لوحة اعتماد للفريق، وقسائم الرواتب/الشهادات/السياسات متاحة عند الطلب — كل ذلك عبر تطبيق الجوال نفسه المستخدم لتسجيل الوقت."
encryption-at-rest-transit:
  name: "تشفير في السكون والنقل"
  desc: "البيانات مشفرة في السكون وأثناء النقل افتراضيًا، مع تقسيم مشفر بين المستأجرين فلا يمكن الوصول لبيانات عميل من حساب آخر. هذا سلوك أساسي في كل وحدة، لا ترقية للمؤسسات."
epf-socso-pcb-automation:
  name: "أتمتة EPF/SOCSO/PCB"
  desc: "المساهمات القانونية — EPF وSOCSO واستقطاعات ضريبة الدخل — تُحسب تلقائيًا في كل دورة رواتب، لا تُضاف لاحقًا. تنتقل دورة الرواتب من الحساب إلى التقديم القانوني مباشرة، فلا يُعاد حساب شيء يدويًا آخر الشهر."
equipment-asset-tracking:
  name: "تتبع المعدات/الأصول"
  desc: "موردو تأجير المعدات يُتتبعون كنوع مورد مستقل، وتتبع المعدات العام حالة استخدام موثقة لشركات الخدمات — لا يوجد سجل أصول ثابتة مخصص بعد، فاعتبره تتبعًا على مستوى الموردين والمخزون."
faster-implementation-legacy-erp:
  name: "تنفيذ أسرع من أنظمة ERP التقليدية"
  desc: "تُضاف الوحدات على مراحل فوق بنية تطبيقات مشتركة بدلًا من إطلاق شامل واحد — تحدد النطاق وتنطلق قسمًا بقسم بدل انتظار انتقال واحد ضخم."
feature-comparison-autocount:
  name: "مقارنة الميزات مع AutoCount"
feature-comparison-sql-account:
  name: "مقارنة الميزات مع SQL Account"
flexible-pricing-tiers:
  name: "مستويات تسعير مرنة"
  desc: "مستويات تسعير حسب الكمية وتسعير خاص بالعميل تدعم عدة أسعار بيع للمنتج الواحد — حالة الاستخدام الموثقة هي بالضبط موزع B2B يدير شرائح أسعار مختلفة عبر علاقات موردين متعددة."
fn-ai-customer-analytics:
  name: "تحليلات عملاء بالذكاء الاصطناعي"
  desc: "تحليلات مبنية على تاريخ الشراء تُظهر مخاطر فقدان العملاء واقتراحات المنتج التالي الأفضل وشرائح العملاء من بيانات موجودة أصلًا في دفاترك — لا مستودع منفصل عليك تغذيته."
fn-bank-reconciliation:
  name: "التسوية البنكية"
  desc: "طابق كشوف البنك مع دفتر الصندوق سطرًا بسطر، وعلّم الفروقات، وأغلق الفجوة بين رصيد الدفاتر ورصيد البنك وفق جدول تتحكم به أنت."
fn-billing-by-stage:
  name: "فوترة حسب المرحلة"
  desc: "فوتر مراحل الأتعاب الثابتة أو نسب الإنجاز أو الوقت والمواد من بنود مستندات مهيأة لكل تكليف — ترتبط الفواتير بالمشروع فيبقى العمل غير المفوتر مرئيًا دائمًا."
fn-bom-management:
  name: "إدارة قوائم المواد"
  desc: "عرّف قوائم مواد متعددة المستويات مع بدائل مكونات وإصدارات، فيتفكك أمر الإنتاج إلى متطلبات مواد دقيقة — بتكلفة من قيم المخزون الحية."
fn-claims-integration:
  name: "تكامل المطالبات"
  desc: "تمر مطالبات المصاريف بدورات اعتماد قابلة للتهيئة وتُسوى عبر الرواتب مقابل سجل الموظف نفسه — حالة المطالبة مرئية إلى جانب بقية بيانات تعويضاته."
fn-cp-commerce-storefront:
  name: "متجر CP-Commerce"
  desc: "شغّل متجرك الإلكتروني بعلامتك الخاصة على CP-Commerce، مدعومًا بالتطبيقات الأساسية الـ 13 نفسها المستخدمة في بقية المنصة — الكتالوج والسلة والدفع والتنفيذ مشمولة."
fn-customer-master-data:
  name: "بيانات العملاء الرئيسية"
  desc: "سجل عميل واحد يحمل الملفات وحدود الائتمان وشروط الدفع وتعدد العناوين عبر المبيعات والفوترة والدعم. حدّثه مرة فتعكس كل عروض الأسعار والطلبات والكشوف التحديث."
fn-digital-crm:
  name: "CRM رقمي"
  desc: "إدارة خط المبيعات والأنشطة والحسابات تقرأ من بيانات العملاء الرئيسية نفسها التي تستخدمها فواتيرك — الصفقة الرابحة تصبح طلبًا دون إعادة إدخال."
fn-ecommerce-catalog:
  name: "كتالوج التجارة الإلكترونية"
  desc: "أدر كتالوج المنتجات الإلكتروني — الأوصاف والصور والمتغيرات والتسعير حسب القناة — في تطبيق واحد يغذي متجرك وقوائم الأسواق معًا."
fn-ecomsync-marketplaces:
  name: "مزامنة الأسواق EcomSync"
  desc: "زامن القوائم والمخزون والطلبات مع Lazada وShopee وأسواق أخرى من كتالوج واحد. طلبات الأسواق تدخل تدفق الطلبات نفسه، والمخزون يُخصم عبر القنوات لحظيًا."
fn-einvoice-generation:
  name: "إنشاء الفاتورة الإلكترونية"
  desc: "تطبيق إنشاء الفواتير الإلكترونية ينشئ فواتير متوافقة من تدفق مبيعاتك المعتاد — دون إعادة إدخال في بوابة. إشعارات الدائن والمدين والإلغاءات تتبع المسار نفسه."
fn-einvoice-validation:
  name: "قواعد التحقق"
  desc: "تُتحقق الفواتير مقابل متطلبات LHDN للحقول والصيغ قبل التقديم، فتُلتقط حالات الرفض داخل BigLedger بدل ارتدادها من مصلحة الضرائب بعد أيام. أخطاء التحقق تشير إلى الحقل المعني بالضبط."
fn-employee-records:
  name: "سجلات الموظفين"
  desc: "سجل موظف رئيسي واحد يحمل الملفات وتعيينات الأقسام والأدوار وبيانات التعويضات — السجل نفسه الذي تقرأ منه الرواتب والمطالبات والتحكم بالوصول، فلا يُصان شيء مرتين."
fn-financial-reporting:
  name: "التقارير المالية"
  desc: "أنشئ قائمة الدخل والميزانية والتدفق النقدي مباشرة من دفتر الأستاذ — دون تصدير أو تجميع يدوي. ربط القوائم معرف في دليل الحسابات فتبقى التقارير صحيحة مع نمو الأعمال."
fn-general-ledger-coa:
  name: "دفتر الأستاذ العام ودليل الحسابات"
  desc: "كل معاملة تُرحَّل إلى دفتر قيد مزدوج مبني على دليل حسابات تصممه مرة — بتسلسلات حسابات وربط قوائم مالية ودعم عملات متعددة. الدفتر نفسه يخدم كل الوحدات فلا شيء يحتاج مزامنة."
fn-goods-receiving:
  name: "استلام البضائع والتسليم الداخلي"
  desc: "استلم مقابل أوامر الشراء وحرّك البضائع داخليًا بأوامر تسليم تُحدّث المخزون لحظة تأكيدها، فيبقى المستودع والدفاتر على الأرقام نفسها."
fn-job-costing:
  name: "تكلفة الأعمال"
  desc: "تُرحَّل العمالة والمواد والمصاريف العامة إلى العمل فور حدوثها، فهامش كل عمل رقم حي — لا إعادة بناء بعد صدور الفاتورة."
fn-job-orders:
  name: "أوامر عمل داخلية"
  desc: "تتبع الأعمال الداخلية — تجميع، تركيب، إعادة تشغيل — بأوامرها وصرف موادها وترحيلات إكمالها، منفصلة عن طلبات العملاء لكن مرئية في عرض العمليات نفسه."
fn-membership-at-checkout:
  name: "العضوية عند الدفع"
  desc: "يكسب الأعضاء نقاطهم ويستبدلونها عند الكاشير عبر تدفق البيع العادي نفسه — عملات النقاط والمستويات والاستبدال عبر الفروع يديرها نظام العضوية، لا إضافة خارجية."
fn-multi-outlet-pos:
  name: "عمليات متعددة الفروع"
  desc: "شغّل كل الفروع على الكتالوج والتسعير ورؤية المخزون نفسها، مع دفاتر صندوق لكل فرع وتقارير موحدة في المركز الرئيسي."
fn-myinvois-integration:
  name: "تكامل MyInvois"
  desc: "قدّم الفواتير إلى نظام MyInvois التابع لـ LHDN مباشرة من BigLedger كمزوّد خدمة PEPPOL معتمد من MDEC. دليل الإعداد يغطي التسجيل وتهيئة البيئة وأول تقديم فعلي."
fn-payroll-statutory:
  name: "امتثال EPF وSOCSO وPCB"
  desc: "تحسب الرواتب EPF وSOCSO وEIS وPCB وفق المعدلات القانونية الحالية وتولّد ملفات التقديم التي تتوقعها الجهات. تحديثات المعدلات تأتي مع المنصة، لا كجدول تصونه بنفسك."
fn-peppol-network:
  name: "شبكة PEPPOL"
  desc: "تبادل الفواتير مع أي مشارك PEPPOL — محلي أو دولي — عبر الشبكة نفسها المستخدمة في أوروبا وآسيا والمحيط الهادئ. تغطي التهيئة معرفات المشاركين وأنواع المستندات والتوجيه."
fn-pos-terminal:
  name: "طرفية نقاط البيع"
  desc: "طرفية بيع كاملة — عمليات الكاشير والإيصالات والمرتجعات وإقفال اليوم — ترحّل كل بيع مباشرة إلى الدفاتر والمخزون. لا معالجة ليلية ولا نظام كاشير منفصل يحتاج تسوية."
fn-pricing-promotions:
  name: "التسعير والعروض"
  desc: "دفاتر الأسعار تدير تسعير الفروع وخصومات الكمية والعروض المؤقتة مركزيًا — ادفع تغيير السعر مرة فتطبقه كل نقاط البيع فورًا."
fn-procurement-controls:
  name: "ضوابط المشتريات"
  desc: "فحوص الموازنة وحدود الاعتماد والمطابقة الثلاثية تُبقي الإنفاق ضمن السياسة قبل الالتزام — لا اكتشافه آخر الشهر."
fn-production-planning:
  name: "تخطيط الإنتاج"
  desc: "خطط دورات الإنتاج مقابل الطلب الفعلي وتوافر المواد، بأوامر عمل تحجز المخزون وتجدول الطاقة."
fn-project-tracking:
  name: "تتبع المشاريع"
  desc: "تتبع مراحل كل مشروع ومهامه وحالته مقابل الخطة في عرض واحد، مع تراكم الوقت والتكاليف على المشروع أثناء سير العمل."
fn-project-workflows:
  name: "تدفقات الاعتماد"
  desc: "التغييرات وتوقيعات المراحل ومحطات الفوترة تمر عبر عمليات اعتماد تطبيق تصميم سير العمل، فتترك قرارات المشروع سجل تدقيق بدل أن تعيش في البريد."
fn-purchase-workflows:
  name: "تدفقات الشراء"
  desc: "طلب الشراء وأمر الشراء والاستلام ومطابقة فاتورة المورد تجري كتدفق واحد متصل مع خطوات اعتماد حيث تحتاجها."
fn-quality-control:
  name: "مراقبة الجودة"
  desc: "نقاط فحص عند الاستلام وأثناء التشغيل وقبل الشحن تسجل نتائج النجاح/الفشل مقابل أمر العمل، فتوقف حالات حجز الجودة الدفعات المعيبة قبل وصولها للعميل."
fn-receivables-cashbook:
  name: "الذمم ودفتر الصندوق"
  desc: "تتبع فوترة العملاء والتحصيل والأعمار من تطبيق الذمم المدينة، وأدر الحسابات النقدية والبنكية في تطبيق دفتر الصندوق مع طرق الدفع والتدفق النقدي. كلاهما يرحّل إلى الدفتر نفسه."
fn-shopify-integration:
  name: "تكامل Shopify"
  desc: "اربط متجر Shopify فتتدفق المنتجات والمخزون والطلبات في الاتجاهين — يغطي الشرح ربط المتجر وربط الأصناف وتنزيل الطلبات دون برمجة مخصصة."
fn-stock-adjustment:
  name: "تعديل المخزون الداخلي"
  desc: "اشطب التوالف وصحّح أخطاء الجرد وسجّل الفائض بأكواد أسباب وضوابط اعتماد، فكل تعديل مفسر وقابل للتدقيق لا تعديل كمية صامت."
fn-stock-balance:
  name: "رصيد المخزون"
  desc: "كميات متوفرة ومحجوزة وقابلة للبيع حية لكل صنف في كل موقع — الأرقام نفسها التي تفحصها أوامر البيع ونقاط البيع والأسواق قبل الالتزام بالمخزون."
fn-stock-take:
  name: "الجرد"
  desc: "نفّذ الجرد الفعلي بمسح مدعوم بالجوال وخيارات جرد أعمى وترحيل فروقات تلقائي بعد اعتماد الجرد. يمكن حصر الجرد بموقع أو منطقة أو فئة فلا تتوقف العمليات."
fn-stock-transfer:
  name: "إجراءات نقل المخزون"
  desc: "انقل المخزون بين الفروع والمستودعات بأوامر نقل موثقة — حالات إرسال وفي الطريق واستلام — فلا يضيع المخزون بين المواقع."
fn-supplier-master-data:
  name: "بيانات الموردين الرئيسية"
  desc: "سجل مورد واحد يحمل شروط الدفع واتفاقيات الشراء وتعيينات الفئات عبر المشتريات والذمم الدائنة. تاريخ أداء المورد يتراكم على السجل نفسه."
fn-tax-configuration:
  name: "تهيئة الضرائب"
  desc: "هيّئ أكواد ومعدلات ومجموعات GST وSST وVAT مرة واحدة في تطبيق تهيئة الضرائب — كل وحدة تنشئ معاملة خاضعة تستخدم القواعد نفسها. دعم تعدد الولايات وتكامل التقديم الإلكتروني مدمجان."
fn-team-management:
  name: "إدارة الفرق"
  desc: "نظّم الموظفين في فرق بصلاحيات على مستوى الفريق وخطوط تبعية، في تطبيق واحد يتشاركه الموارد البشرية ومديرو النظام بدل هيكلين متوازيين."
fn-unified-contact-center:
  name: "مركز اتصال موحد"
  desc: "عالج مكالمات الدعم والمحادثات والتذاكر وطلبات العميل وفواتيره وحالة دفعه على الشاشة نفسها. يجيب الموظف من نظام السجلات بدل أن يطلب من العميل التكرار."
franchisee-royalty-tracking:
  name: "تتبع رسوم الامتياز"
full-module-catalog-access:
  name: "وصول لكامل كتالوج الوحدات"
  desc: "حزمة ERP الكاملة تضم كل التطبيقات الـ 41 — كل تطبيقات المحاسبة ونقاط البيع إضافة إلى تطبيقات ERP الخاصة — ومتجر التطبيقات يدعم تثبيتات غير محدودة لكل مستأجر."
full-mrp-integration:
  name: "تكامل MRP كامل"
  desc: "تخطيط متطلبات المواد وMRP المدفوع بالطلب يعملان جنبًا إلى جنب مع تخطيط وجدولة متقدمين قائمين على القيود، عبر السلسلة الكاملة من توقع المبيعات حتى جدول الإنتاج."
full-service-history:
  name: "سجل خدمة كامل"
  desc: "سجلات العملاء ترتبط مباشرة بسجل الخدمة والعقود كجزء من تكامل إدارة العملاء القياسي."
guided-data-import-templates:
  name: "قوالب استيراد بيانات موجهة"
guided-onboarding:
  name: "تهيئة موجهة"
hipaa-ready-infrastructure:
  name: "بنية تحتية جاهزة لـ HIPAA"
historical-data-migration:
  name: "ترحيل البيانات التاريخية"
implementation-reseller-partnerships:
  name: "شراكات تنفيذ وإعادة بيع"
inter-company-transactions:
  name: "معاملات بين الشركات"
  desc: "تطبيق مخصص لمعالجة المعاملات بين الشركات يدير معاملات الكيانات المتعددة مباشرة، مغطيًا سيناريوهات المعاملات بين الفروع نفسها المستخدمة في العمليات متعددة الفروع."
inventory-analytics:
  name: "تحليلات المخزون"
  desc: "يغطي تحليل المخزون نقاط إعادة الطلب ومخزون الأمان، وتحليل الحركة (سريع/بطيء، معدل الدوران)، والتقييم حسب الموقع أو الطريقة — مع تصنيف ABC وحساب كمية الطلب الاقتصادية مدمجين."
iso27001-certified-infrastructure:
  name: "بنية تحتية معتمدة ISO 27001"
  desc: "البنية التحتية مبنية وفق معايير ISO 27001 وPCI DSS، مع دعم امتثال SOC 2 Type II وGDPR لنشر المؤسسات. يعمل هذا مع المصادقة متعددة العوامل والتشفير كخط أمان أساسي واحد."
job-costing-profitability:
  name: "تكلفة الأعمال والربحية"
  desc: "التقاط تكاليف المشروع واستغلال الموارد والربحية تتجمع لكل مشروع، مع مراقبة الموازنة والاعتراف بالإيراد ضمن مالية المشروع نفسها — لا تسوية منفصلة آخر الشهر."
leave-claims-workflows:
  name: "تدفقات الإجازات والمطالبات"
  desc: "طلبات الإجازة تتبع تدفق اعتماد محددًا — طلب، اعتماد المدير، خصم الرصيد, أثر الرواتب، تحديث السجل — والمطالبات تُتتبع في سجل المزايا نفسه، لا في نظام منفصل."
live-inventory-aware-quoting:
  name: "تسعير مدرك للمخزون الحي"
  desc: "توليد عروض الأسعار في CRM يعتمد مستويات المخزون الفعلية المتتبعة حيًا عبر كل المواقع، فيعكس العرض ما هو متاح فعلًا لا لقطة قديمة."
local-compliance-built-in:
  name: "امتثال محلي مدمج"
  desc: "امتثال MyInvois (LHDN) وPEPPOL أصيل في وحدة الفاتورة الإلكترونية، وتهيئة الضرائب تأتي بحالة GST/SST ماليزية جاهزة — تسجيل، ضريبة خدمات، إقرارات GST شهرية، تقارير SST ربع سنوية — لا شيء تبنيه من الصفر."
local-support-transition:
  name: "دعم محلي أثناء الانتقال"
loyalty-membership:
  name: "الولاء والعضوية"
  desc: "هيّئ عملات نقاط مسماة بمعدلات كسب واستبدال خاصة — نموذج ثابت 1 رينغيت = نقطة أو معدلات متدرجة كـ 1.5x للفضي حتى 3x للبلاتيني. تُرحَّل النقاط تلقائيًا عند الدفع، دون نظام ولاء منفصل يحتاج تسوية."
marketplace-integrations:
  name: "تكاملات الأسواق"
  desc: "مزامنة مخزون لحظية وتجميع طلبات يتصلان بـ Lazada وShopee وShopify افتراضيًا، مع توفر Amazon وeBay عبر تطبيق سوق التجارة."
marketplace-payout-reconciliation:
  name: "تسوية مدفوعات الأسواق"
medical-billing:
  name: "الفوترة الطبية"
  desc: "بنود الخدمات القابلة للفوترة — استشارات، إجراءات، فحوص، تقارير طبية — تُهيأ عبر أدوات فوترة بنود الخدمة العامة في المنصة، مطبقة على حالة استخدام طبية موثقة."
membership-program-management:
  name: "إدارة برنامج العضوية"
  desc: "أنشئ فئات الأعضاء والتسميات وعملات النقاط عبر تسلسل موجه — أنشئ الفئة، عيّن التسميات، ثم هيّئ عملات النقاط — لا قائمة أعضاء مسطحة. يعمل فوق إعداد المؤسسة ودفتر الأسعار القائمين دون تكرار."
mobile-access-owners:
  name: "وصول عبر الجوال"
  desc: "وظائف CRM والموارد البشرية الأساسية تعمل أصليًا على iOS وAndroid وكتطبيق ويب تقدمي بقدرة دون اتصال — فلا يتوقف الإشراف عند باب المكتب."
mobile-friendly-solo-teams:
  name: "ملائم للجوال للأفراد والفرق الصغيرة"
  desc: "CRM كامل يعمل على iOS وAndroid وكتطبيق ويب تقدمي، بقدرة دون اتصال فلا تعتمد على الإشارة لفحص سجل عميل. النمط نفسه يغطي الموارد البشرية — ساعة الدوام وطلبات الإجازة والاعتمادات."
modular-pay-for-use:
  name: "معياري، ادفع لما تستخدمه"
  desc: "كل وحدة هي تجميعة من التطبيقات الأساسية نفسها — تثبّت وتدفع لتطبيقات مفردة من السوق بدل ترخيص حزمة ميزات لن تلمسها. التطبيقات المجانية والمدفوعة جنبًا إلى جنب في الكتالوج نفسه."
multi-branch-inventory:
  name: "مخزون متعدد الفروع"
  desc: "تحكم مركزي يمتد عبر مستودعات متعددة مع توزيع مخزون بحسب الفرع وتحويلات بين المواقع وتتبع على مستوى المنطقة/الرف — ويحتفظ كل فرع بتسعيره المحلي."
multi-department-workflows:
  name: "تدفقات متعددة الأقسام"
  desc: "توجيه الاعتماد يُبنى بمصمم سير عمل مرئي بالسحب والإفلات — حتى 50 خطوة و10 مستويات اعتماد — فيتنقل أمر الشراء من مدير القسم إلى المدير المالي إلى الرئيس التنفيذي حسب حد القيمة فقط."
multi-entity-consolidation:
  name: "توحيد متعدد الكيانات"
  desc: "التقارير الموحدة عبر الكيانات قدرة معلنة في المحاسبة المالية، بتطبيق معالجة توحيد مخصص وهيكل أم-تابع على مستوى المؤسسة يغذيه."
multi-entity-multi-currency-gl:
  name: "دفتر أستاذ متعدد الكيانات والعملات"
  desc: "المعاملات الدولية تُرحَّل أصليًا بعملتها، وعلاقات الشركة الأم بالتابعة تُنمذج مباشرة في هيكل المؤسسة — لا محاكاة بحيل في دليل حسابات أحادي الكيان."
multi-marketplace-listing-management:
  name: "إدارة قوائم متعددة الأسواق"
  desc: "عرض قوائم مخصص يتتبع الأصناف المزامنة من كتالوجك الداخلي مقابل المنشور فعلًا في كل سوق، مع اتصال EcomSync بـ Lazada وShopee وShopify لإبقاء القوائم محدثة."
multi-outlet-management:
  name: "إدارة متعددة الفروع"
  desc: "إعداد السلاسل متعددة المتاجر يغطي سلاسل التجزئة والامتياز ومنافذ المولات بمخزون مركزي وتحويلات بين المتاجر وعروض على مستوى السلسلة. يحتفظ كل فرع بتسعيره وطرق تسويته واتصالات أسواقه."
multi-outlet-performance-view:
  name: "عرض أداء متعدد الفروع"
  desc: "إعداد السلاسل متعددة المتاجر يوحّد التقارير والعروض عبر المواقع، مع تطبيق تقارير نقاط بيع مخصص بُني تحديدًا لمقارنة أداء متجر بمتجر."
multi-outlet-ready:
  name: "جاهز لتعدد الفروع"
  desc: "إعداد السلاسل متعددة المتاجر يدير المخزون المركزي والتحويلات بين المتاجر والتقارير الموحدة والعروض على مستوى السلسلة جاهزًا، مع تقارير مخصصة لمقارنة أداء المتاجر."
multi-outlet-stock-transfers:
  name: "تحويلات مخزون بين الفروع"
  desc: "التحويلات بين المتاجر معيار داخل السلسلة، وتحويلات المخزون بين العلامات قدرة موثقة للعمليات متعددة العلامات المتشاركة بنية توزيع واحدة."
multi-project-tracking:
  name: "تتبع مشاريع متعددة"
  desc: "المشاريع متعددة المراحل تحصل على هيكل تجزئة أعمال كامل ومخططات غانت وتحليل مسار حرج، مع تحليلات محفظة تجمع المشاريع في عرض شامل — مشاريع السعر الثابت والوقت والمواد والدفعات المقدمة مدعومة معًا."
multi-warehouse-management:
  name: "إدارة مستودعات متعددة"
  desc: "إدارة المناطق وتحسين المواضع وتخطيط الموجات تنسق الالتقاط والتخزين عبر المنشآت، مع دعم العبور المباشر (مرور، دمج في الطريق، تفكيك) لمراكز التوزيع وعمليات 3PL تحديدًا."
offline-capable-pos:
  name: "نقاط بيع تعمل دون اتصال"
  desc: "تطبيق مزامنة دون اتصال مخصص يُبقي البيع مستمرًا أثناء انقطاع الاتصال — يخزن المعاملات محليًا ثم يزامن تلقائيًا مع حل التعارضات وفحوص سلامة البيانات عند عودة الاتصال. بُني خصيصًا للأسواق والمعارض ووحدات البيع المتنقلة."
order-to-delivery-tracking:
  name: "تتبع من الطلب إلى التسليم"
  desc: "تمر الطلبات بعملية صرف مخزون محددة — حجز، قائمة التقاط، تسليم، تحديث المخزون — مع أوامر تسليم تتتبع تفاصيل المركبة وشركة النقل، لا مجرد علامة حالة."
parallel-run-support:
  name: "دعم التشغيل المتوازي"
parts-catalog-management:
  name: "إدارة كتالوج قطع الغيار"
  desc: "المنتجات تحمل أكوادًا متعددة (SKU، UPC، كود المصنّع) مع حقول مواصفات فنية وتكامل كتالوج الموردين — أدوات ملف الأصناف نفسها لأي كتالوج قطع، لا قاعدة قطع خاصة بالسيارات."
patient-record-management:
  name: "إدارة سجلات المرضى"
pay-as-you-grow-pricing:
  name: "تسعير ينمو معك"
  desc: "مستوى دفع-حسب-الاستخدام مخصص يلغي الالتزام الشهري كليًا — تسعير لكل فاتورة بكل الميزات، مصمم للأحجام الموسمية أو المبكرة. سوق التطبيقات يعكس ذلك لكل تطبيق، باشتراكات مجانية ومدفوعة معًا."
per-entity-compliance-sst-einvoice:
  name: "امتثال لكل كيان (SST/فاتورة إلكترونية)"
  desc: "تهيئة الضرائب متعددة الدول تدير القواعد الخاصة بكل دولة وضرائب المعاملات بين الشركات، ثم تتجمع في تقارير ضريبية موحدة — فيبقى كل كيان ممتثلًا محليًا دون كسر رؤية المجموعة."
per-outlet-performance-reporting:
  name: "تقارير أداء لكل فرع"
  desc: "تقارير مقارنة المتاجر وأداء الكاشير تضع الفروع جنبًا إلى جنب مباشرة، مع تحليل مبيعات المنتجات وتفصيل طرق الدفع — مبنية للمقارنة لا لتقارير معزولة."
pharmacy-inventory:
  name: "مخزون الصيدلية"
points-currency-configuration:
  name: "تهيئة النقاط والعملات"
  desc: "عرّف عملات نقاط مسماة (مثل LOYPTS وGOLDPTS وVIPPTS) بمعدلات كسب واستبدال خاصة — نموذج بسيط 1 = 1 أو معدلات متدرجة كـ 1.5x للفضي و3x للبلاتيني. تُرحَّل النقاط تلقائيًا عند الدفع عبر تدفق البيع نفسه."
policy-enforcement:
  name: "إنفاذ السياسات"
post-launch-support:
  name: "دعم ما بعد الإطلاق"
production-planning-scheduling:
  name: "تخطيط وجدولة الإنتاج"
  desc: "جدول إنتاج رئيسي مدفوع بالطلب يغذي تخطيط متطلبات مواد آليًا، مع جدولة أرضية المصنع مقابل طاقة محدودة أو غير محدودة لكل مركز عمل — لا جدول مسطح يتجاهل الطاقة."
progress-billing:
  name: "الفوترة المرحلية"
  desc: "تطبيق تتبع تكاليف مشاريع مخصص يدير الفوترة المرحلية مع التقاط التكاليف وتوزيع الوقت والمصاريف وربحية المشروع — فوترة مرتبطة بالتقدم الفعلي لا بتقويم محطات ثابت."
project-time-tracking:
  name: "تتبع وقت المشاريع"
  desc: "سجّل الساعات القابلة وغير القابلة للفوترة حسب المشروع والمهمة والعضو. الجداول الزمنية تتجمع تلقائيًا في تقارير استغلال فترى الطاقة الحقيقية قبل الالتزام بنطاق العمل التالي."
proposal-management:
  name: "إدارة العروض"
  desc: "أنشئ وأرسل عروضًا محددة النطاق بأسعار من دفتر أسعارك، وتتبع حالة قبول العميل، وحوّل العرض المقبول مباشرة إلى مشروع — دون تسليم يدوي."
public-status-page:
  name: "صفحة حالة عامة"
  desc: "حالة النظام الحالية وأي نوافذ صيانة مخططة تُنشر حية على status.bigledger.com، بدل أن تظهر الأعطال عبر تذاكر الدعم فقط."
quality-inspection:
  name: "فحص الجودة"
  desc: "خطط مراقبة الجودة خاصة بكل عملية، مع نقاط فحص لحظية أثناء التشغيل وضبط إحصائي للعمليات يغذي إدارة عدم المطابقة. أطر الامتثال مدمجة بالاسم — ISO 9001 وAS9100 للطيران وTS 16949 للسيارات."
quick-setup-no-it:
  name: "إعداد سريع دون فريق تقني"
  desc: "التطبيقات تُثبَّت بنقرة من الكتالوج، أو دفعة واحدة بزر \"تثبيت الكل\" — دون خوادم أو تذاكر تقنية. إعداد الفاتورة الإلكترونية للشركات الصغيرة مبني صراحة على أدنى تعقيد تقني بقوالب مسبقة التهيئة."
real-time-business-dashboard:
  name: "لوحة أعمال لحظية"
  desc: "تطبيق لوحة مؤسسية مخصص يقدم مراقبة KPI على مستوى الإدارة العليا — مقاييس لحظية وبطاقات أداء وتحليلات تنبؤية — فوق تحليلات اللوحات اللحظية المدمجة أصلًا في المحاسبة المالية."
real-time-stock-sync:
  name: "مزامنة مخزون لحظية"
  desc: "المخزون يتحدث ويُخصم لحظيًا عبر نقاط البيع والتجارة الإلكترونية، مع تنبيهات انخفاض وتحويلات بين المتاجر مدمجة — إضافة لإدارة مخزون احتياطي ومعالجة طلبات مسبقة فلا تبيع ما نفد."
redundant-infrastructure:
  name: "بنية تحتية مكررة"
  desc: "بنية التوافر العالي خلف اتفاقية التوافر تعمل عبر مراكز بيانات متعددة بموازنة أحمال وتحويل تلقائي عند العطل ونسخ لحظي — فلا يتحول عطل عقدة واحدة إلى انقطاع يراه العميل."
referral-commissions:
  name: "عمولات الإحالة"
regular-security-audits:
  name: "تدقيقات أمنية دورية"
  desc: "مراقبة أمنية لحظية وكشف تهديدات يعملان باستمرار، مع تقارير امتثال آلية تُولَّد مقابل أطر تنظيمية متعددة معًا بدل تجميعها يدويًا لكل تدقيق."
reimbursement-tracking:
  name: "تتبع التعويضات"
  desc: "مطالبات المصاريف والتعويضات تُتتبع ضمن سجل المزايا والتعويضات نفسه الذي تصونه الموارد البشرية أصلًا، فتظهر حالة المطالبة بجانب بقية بيانات رواتب الموظف."
resource-scheduling:
  name: "جدولة الموارد"
  desc: "عيّن الأشخاص للمشاريع وفق التوافر الفعلي لا التخمين. اطّلع على الاستغلال حسب العضو وأعد توزيع العبء قبل أن يُحجز المشروع فوق طاقته."
rma-repair-workflow:
  name: "تدفق RMA والإصلاح"
  desc: "معالجة المرتجعات تدعم تدفقات إصلاح وتجديد كاملة، مع لوجستيات عكسية تدير مرتجعات الضمان — عملية RMA مبسطة قدرة معلنة للتجزئة والتجارة الإلكترونية تحديدًا."
role-based-access-control:
  name: "تحكم وصول قائم على الأدوار"
  desc: "الصلاحيات تحكمها أدوار بوراثة وتفويض، تُحصر حتى مستوى التطبيق الواحد — قابلة للتهيئة لكل فرع أو شركة أو موقع. المنصة مبنية لهذا على نطاق واسع: حتى 10,000 مستخدم متزامن عبر 1,000 مستأجر."
sales-pipeline-automation:
  name: "أتمتة خط المبيعات"
  desc: "الصفقات تتحرك عبر خط مرئي بأسلوب كانبان بمراحل قابلة للتهيئة وأوزان احتمال (استكشاف 10٪ حتى إتمام 100٪)، مطلقة أتمتة سير عمل عند تغيّر المرحلة بدل تتبع متابعة يدوي."
serial-warranty-tracking:
  name: "تتبع التسلسل والضمان"
  desc: "كل صنف يمكن تتبعه بالرقم التسلسلي عبر دورة حياته كاملة، مع إدارة دفعات وأنساب (أين استُخدم، من أين أتى) تدعم إدارة الاستدعاء — شروط الضمان تُسجَّل مباشرة على سجل المنتج."
shop-floor-control:
  name: "مراقبة أرضية المصنع"
  desc: "الإنتاج يمر بتدفق محدد — إطلاق أمر العمل، صرف المواد، الإنتاج، مراقبة الجودة، إكمال الأمر — بمراقبة لحظية في كل خطوة، تشمل تعيين الموارد وتتبع العمالة."
side-by-side-feature-comparison:
  name: "مقارنة ميزات جنبًا إلى جنب"
sst-filing-reporting:
  name: "تقديم SST والتقارير"
  desc: "هيّئ SST ككود ضريبي مخصص (مثل ضريبة خدمات 6٪ مربوطة مباشرة بحساب الذمم الدائنة) بجانب GST وVAT في مكتبة واحدة. فترات التقارير تُضبط حسب الحاجة — شهرية أو ربع سنوية أو سنوية — كما تُقدَّم إقرارات SST الماليزية فعلًا."
statutory-report-generation:
  name: "توليد التقارير القانونية"
  desc: "ولّد الإقرارات الضريبية والتقارير القانونية مباشرة من بيانات المعاملات، مع تكامل تقديم إلكتروني يوصلها للجهة المختصة. التقارير الضريبية الكبيرة تعود في أقل من 30 ثانية، بدعم تاريخ معاملات محفوظ 10+ سنوات للتدقيق."
subcontractor-management:
  name: "إدارة المقاولين من الباطن"
  desc: "سجلات الموردين تميّز المقاولين من الباطن عن موردي المواد والمعدات مباشرة، مع تعيينات موردين لكل مشروع وتتبع شهادات الامتثال/السلامة — حالة استخدام إنشائية موثقة، لا قائمة موردين عامة."
supplier-price-list-management:
  name: "إدارة قوائم أسعار الموردين"
  desc: "سجلات الموردين تحمل تسعير الكميات وهياكل الخصومات واتفاقيات الشراء وشروط الائتمان — بنطاق موثق حتى 500,000 سجل مورد، مع مستويات سعرية بحسب علاقة المنتج بالمورد."
supplier-stock-sync:
  name: "مزامنة مخزون الموردين"
  desc: "توافر المنتجات يتزامن لحظيًا عبر شبكة مورديك من خلال تكامل API مباشر، مع تطبيق مخصص لإدارة شبكة الموردين يقيّم أداءهم ضمن المزامنة."
technology-api-integrations:
  name: "تكاملات تقنية وAPI"
  desc: "سوق التطبيقات يدعم أصلًا كتالوجات عامة وخاصة لتوزيع تطبيقات طرف ثالث، وتطبيق Webhook يوفر تكامل API حقيقيًا عام الغرض — إشعارات مدفوعة بالأحداث يمكن لأي نظام شريك البناء عليها."
time-attendance-tracking:
  name: "تتبع الوقت والحضور"
  desc: "التقاط الوقت يدعم البصمة والجوال والويب معًا، مع أنماط ورديات مرنة وحساب العمل الإضافي وتحليلات حضور تُظهر الأنماط لا مجرد بيانات بصمة خام."
training-onboarding-support:
  name: "دعم التدريب والتهيئة"
unified-cross-channel-inventory:
  name: "مخزون موحد عبر القنوات"
  desc: "المخزون يبقى مركزيًا عبر كل قناة، مع معالجة طلبات موحدة أيًا كان مصدر الطلب وقواعد توزيع مخزون بأولوية القناة. نقاط البيع والتجارة الإلكترونية تتشاركان صورة المخزون نفسها حتى طلبات الاستلام من المتجر."
uptime-sla-999:
  name: "اتفاقية توافر 99.9٪"
  desc: "تعمل المنصة على بنية توافر عالٍ بضمان 99.9٪ — وعمليًا تجاوز التوافر الفعلي 99.95٪، بإجمالي توقف أقل من 9 ساعات سنويًا."
vin-tracking:
  name: "تتبع VIN"
voucher-management:
  name: "إدارة القسائم"
workshop-service-scheduling:
  name: "جدولة الورشة والخدمة"
  desc: "جدولة موارد قائمة على المهارات تطابق الفنيين مع الأعمال مع تحسين الجداول، وإدارة الخدمة الميدانية تضيف إرسال أوامر العمل وتطبيقات فنيين للجوال وتتبع مسارات GPS."
