params:
  # Theme settings
  theme:
    default: dark
    displayToggle: true
    
  # Navigation
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/bigledger-logo-cropped.png
      dark: images/bigledger-logo-cropped.png
      width: 200
      height: 40
      link: /
    width: wide
    
  # Page settings
  page:
    width: normal
    
  # Footer
  footer:
    displayCopyright: false  # We handle copyright in custom footer
    displayPoweredBy: false  # Remove Hextra branding
    width: wide
    
  # Edit this page - DISABLED for corporate site
  editURL:
    enable: false

  # Search - DISABLED for corporate site
  search:
    enable: false

  # Sidebar - DISABLED for corporate site
  sidebar:
    enable: false

  # Table of contents - DISABLED for corporate site
  toc:
    enable: false
    
  # Comments
  comments:
    enable: false
    
  # Analytics
  analytics:
    enable: false
    
  # Social links
  socialLinks:
    - icon: github
      link: https://github.com/bigledger
    - icon: twitter
      link: https://twitter.com/bigledger
      
  # Custom CSS for high-tech theme
  custom_css:
    - css/custom.css

# Menu configuration - Corporate navigation
menu:
  main:
    - identifier: home
      name: Home
      weight: 1
      pageRef: /

    - identifier: about
      name: About
      weight: 2
      pageRef: /about

    - identifier: solutions
      name: Solutions
      weight: 3
      pageRef: /solutions

    - identifier: pricing
      name: Pricing
      weight: 4
      pageRef: /pricing

    - identifier: contact
      name: Contact
      weight: 5
      pageRef: /contact

    - identifier: developers
      name: Developers
      weight: 6
      pageRef: /developers

outputs:
  home:
    - HTML
    - RSS

deployment:
  targets:
    - name: production
      URL: s3://bigledger.com?region=ap-southeast-5
      cloudFrontDistributionID: ELHXIGVKWA8XV

  # Without these, objects are uploaded with no Cache-Control header at all.
  # Browsers then fall back to heuristic caching and keep serving an old copy
  # of a page long after a deploy — invalidating CloudFront does not help,
  # because the stale copy lives in the visitor's own browser.
  matchers:
    # Pages must revalidate on every visit so a deploy is visible immediately.
    - pattern: ^.+\.(html|xml|json|webmanifest|txt)$
      cacheControl: "public, max-age=0, must-revalidate"
    # CSS/JS carry a ?v= cache-buster, so an hour is safe and still lets a
    # forgotten bump correct itself the same day.
    - pattern: ^.+\.(css|js)$
      cacheControl: "public, max-age=3600, must-revalidate"
    # Images and fonts are content-stable; cache them hard.
    - pattern: ^.+\.(png|jpe?g|gif|svg|ico|webp|avif|woff2?|ttf|eot)$
      cacheControl: "public, max-age=2592000"

# Permalink configuration to ensure consistent URLs
permalinks:
  pages: /:slug/
  posts: /:slug/

# URL management
disablePathToLower: false
relativeURLs: false
canonifyURLs: true