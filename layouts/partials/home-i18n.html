{{/* Non-English homepage: renders content/<lang>/_index.md's hero/tabs/cards
     shortcodes through the theme's plain hextra-home wrapper (no sidebar),
     since the custom bl- marketing homepage in layouts/index.html is
     English-only. Requires the Hextra CSS bundle — see baseof.html. */}}
<div class="hx:mx-auto hx:flex hextra-max-page-width">
  <div class="hx:w-full hx:break-words hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:pb-8 hx:pt-8 hx:md:pt-12 hx:pl-[max(env(safe-area-inset-left),1.5rem)] hx:pr-[max(env(safe-area-inset-left),1.5rem)]">
    <div class="hx:flex hx:flex-col hx:items-start">
      {{ .Content }}
    </div>
  </div>
</div>
