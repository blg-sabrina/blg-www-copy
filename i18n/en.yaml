pr_phil_label: "OUR PRICING PHILOSOPHY"
pr_phil_title: "High setup. Low recurring."
pr_phil_desc: "Most ERP vendors do it the other way round: a low entry price, a subscription that climbs every year, and an implementation you are left to figure out on your own. We think that is backwards."
pr_phil_p1: "BigLedger charges a higher one-time implementation fee because a successful launch is not a download. It is a dedicated project manager, a documented requirements study, careful data migration, and hands-on training for the people who will actually use the system. We do that work upfront so the platform fits your business from day one."
pr_phil_p2: "Because setup is paid once, your recurring software fee stays low — and stays low. Over a three-to-five year horizon, that is where the real saving lands."
pr_pil1_t: "One-time implementation"
pr_pil1_d: "A dedicated project manager, a documented requirements study, and hands-on training for your team. Paid once, at the start, so nothing has to be improvised later."
pr_pil2_t: "Low recurring subscription"
pr_pil2_d: "With the setup already covered, your monthly software fee stays modest — from RM150 a month. No per-seat creep, no annual escalation built into the contract."
pr_pil3_t: "Infinite customizability"
pr_pil3_d: "BigLedger is built on an Applet architecture — small, composable units of business logic. If your requirement does not exist yet, we build it as a module, a workflow, or an integration."
pr_plans_label: "PLANS"
pr_plans_title: "Five ways to start"
pr_plans_desc: "Every plan pairs a one-time implementation with a low monthly software subscription. Cloud infrastructure is billed separately, at cost."
