mp_test1_d: "想试用 BigLedger / akaun.com 的预生产环境？向我们提交申请，我们会专人为您开通。"
mp_test1_btn: "申请演示访问权限"
mp_test2_tag: "Peppol 测试"
mp_test2_t: "Peppol 测试环境"
mp_test2_d: "BigLedger 运营一个专用的 Peppol 预生产接入点，已连接 OpenPeppol 测试 SMP/SML，用于 MDEC 认证与合作伙伴的一致性测试。"
mp_test2_1: "<strong>发送方</strong>与<strong>接收方</strong>角色均已启用"
mp_test2_2: "单据类型：发票、贷项通知单、借项通知单、自开发票、订单、订单回复、发货通知"
mp_test2_3: "规范档案：Peppol BIS Billing 3.0、Peppol PINT MY（马来西亚）"
mp_test2_4: "提供 MLR（消息层级回执）与一致性测试报告"
mp_test2_note: "<strong>用于 MDEC 一致性测试的测试 PEPPOL ID</strong> 按提出申请的机构逐一签发。MDEC 评审人员请发送邮件至 <a href=\"mailto:support@bigledger.com?subject=MDEC%20Peppol%20Test%20ID%20Request\">support@bigledger.com</a>，或在 Telegram 上联系 <a href=\"https://t.me/leehongfay\" target=\"_blank\" rel=\"noopener\">@leehongfay</a>，我们将在同一个工作日内提供当前有效的测试 Peppol ID、SMP 端点与一致性测试证明。"
mp_test_cta1: "申请测试访问权限"
mp_final_h: "准备好免费实现合规了吗？"
mp_final_sub: "与 BigLedger 一同加入 MDEC 国家电子发票倡议。每月 200 笔交易，三年免费，完整满足 MyInvois &amp; PEPPOL 合规要求。"
mp_final_hours: "周一至周五 9:00 – 18:00（马来西亚时间）· 通常数小时内回复"

