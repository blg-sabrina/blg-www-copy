price_faq2_a: "当然可以。方案的设计能够随您一同成长——随着业务扩张，可以增加模块、用户或交易容量。同样也完全支持缩减规模。"
price_faq3_q: "接受哪些付款方式？"
price_faq3_a: "我们接受 Visa、Mastercard、Amex、银行转账以及 FPX 网上银行。年度合约相比按月计费可享受可观的折扣。"
price_faq4_q: "我的数据安全吗，是否存储在马来西亚？"
price_faq4_a: "是的。所有数据均存储在马来西亚数据中心，在静态和传输过程中均经过加密，采用通过 ISO 27001 认证的基础设施并每日自动备份。"
price_faq5_q: "培训和入门支持方面如何？"
price_faq5_a: "所有方案均包含文档、视频教程和专属的入门团队。我们还根据您的方案级别提供定制培训课程和数据迁移协助。"
