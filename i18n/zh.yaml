# --- Pricing: philosophy, plans, bespoke development (/pricing/) ---
pr_phil_label: "我们的定价理念"
pr_phil_title: "前期投入高，长期费用低。"
pr_phil_desc: "多数 ERP 厂商的做法恰恰相反：入门价格很低，订阅费逐年上涨，而实施过程却要你自己摸索。我们认为这是本末倒置。"
pr_phil_p1: "BigLedger 收取较高的一次性实施费用，是因为成功上线绝不只是下载一套软件。它意味着专属项目经理、成文的需求调研、审慎的数据迁移，以及针对实际使用者的实操培训。我们把这些工作前置完成，让系统从第一天起就贴合你的业务。"
pr_phil_p2: "由于实施费用只支付一次，你的软件订阅费始终保持在低水平，而且会一直保持下去。放到三到五年的周期来看，真正的节省正是在这里体现。"
pr_pil1_t: "一次性实施投入"
pr_pil1_d: "专属项目经理、成文的需求调研，以及面向团队的实操培训。在项目开始时一次付清，后续无需临时补救。"
pr_pil2_t: "低额持续订阅"
pr_pil2_d: "实施费用已经涵盖，你的月度软件费用可以保持在低位——每月低至 RM150。不按席位层层加价，合同中也没有预设的年度涨幅。"
pr_pil3_t: "无限可定制"
pr_pil3_d: "BigLedger 基于 Applet（小应用）架构构建，由可自由组合的业务逻辑单元组成。如果你需要的功能尚不存在，我们可以将其开发为模块、流程或集成。"
pr_plans_label: "方案"
pr_plans_title: "四种起步方式"
pr_plans_desc: "每个方案都由一次性实施费用与低额月度软件订阅组成。云基础设施按实际成本单独计费。"
