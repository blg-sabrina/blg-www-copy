pr_faq_setup_q: "为什么你们的实施费用比其他厂商高？"
pr_faq_setup_a: "因为其他厂商留给你自己做的工作，由我们来完成。这笔费用涵盖专属项目经理、成文的需求调研、数据迁移和实操培训。正因如此，我们的订阅费才能保持在这么低的水平，我们的项目也才能真正落地。"
pr_faq_cloud_q: "云基础设施包含在订阅费里吗？"
pr_faq_cloud_a: "不包含。基础设施按实际用量、以成本价单独计费。本页所列数字是各档位典型部署的预估值，让你能够按整体投入做预算，而不只是看软件这一项。"
pr_faq_custom_q: "如果标准产品里没有我要的功能怎么办？"
pr_faq_custom_a: "我们会把它做出来。BigLedger 的 Applet 架构意味着定制模块、流程和集成会成为系统的原生组成部分，而不是外挂。定制开发按每人天 RM1,500 计费，并且始终先确定范围、报价后再开工。"
pr_cta_label: "联系我们"
pr_cta_h: "让我们把需求理清楚。"
pr_cta_sub: "预约一次深入沟通，我们会一起梳理你的业务实际运作方式，演示针对你所在行业配置的系统，并给出明确的报价与时间表。如果你的需求比较特殊，那正是我们最想聊的话题。"
