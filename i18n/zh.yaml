mp_hero_badge: "MDEC 国家电子发票倡议 · 官方认证合作伙伴"
mp_hero_title: "马来西亚电子发票，三年免费"
mp_hero_sub: "作为 <strong>MDEC 全面认证的 PEPPOL 服务供应商</strong>，BigLedger 很荣幸参与 MDEC 国家电子发票倡议——协助马来西亚中小企业零成本达成 LHDN 电子发票合规。"
mp_offer_tag: "限时优惠 · MDEC 合作伙伴专享"
mp_offer_headline: "免费使用 BigLedger 马来西亚电子发票应用组件"
mp_metric1: "每月交易笔数"
mp_metric2: "免费年限"
mp_metric3: "订阅费用"
mp_offer_note: "BigLedger MDEC 电子发票 2025 版 · 完整涵盖 LHDN MyInvois &amp; PEPPOL 合规要求"
mp_cta_tg: "通过 Telegram @leehongfay 领取"
mp_about_h: "关于 MDEC 国家电子发票倡议"
mp_about_p1: "MDEC——马来西亚的 Peppol 主管机构——在 Pemangkin Malaysia Digital 框架下推出<strong>国家电子发票倡议</strong>，协助企业平稳过渡到 LHDN 强制实施的电子发票制度。该「免费 &amp; 经济型解决方案」计划由 MDEC 携手 <strong>16 家认证解决方案供应商</strong>共同推行，其中包括 <strong>BigLedger</strong>，为马来西亚中小企业提供大幅折扣甚至免费的电子发票配套。"
mp_about_p2: "该倡议配合马来西亚分阶段推行的电子发票政策，自 <strong>2025 年 7 月 1 日</strong>起对所有企业强制实施。BigLedger 的方案已列入 <a href=\"https://www.mdec.my/national-einvoicing/freemium-and-affordable-solutions\" target=\"_blank\" rel=\"noopener\">MDEC 官方「免费 &amp; 经济型解决方案」页面</a>。"
mp_incl_h: "本次优惠包含哪些内容"
mp_incl_sub: "开具合规的马来西亚电子发票所需的一切——没有隐藏费用，无需信用卡。"
mp_incl1_t: "电子发票生成应用组件"
mp_incl1_d: "开箱即用地创建符合 LHDN 规范的电子发票，自动完成 TIN 校验、税额计算与 UBL 2.1 格式转换。"
mp_incl2_t: "MyInvois 直连提交"
mp_incl2_d: "通过认证 API 集成直接提交至 LHDN 的 MyInvois 门户，支持自动重试与实时状态追踪。"
mp_incl3_t: "PEPPOL 发送 &amp; 接收"
mp_incl3_d: "完整的 Peppol 双向交换能力——通过 BigLedger 获得 MDEC 认证的接入点，既可对外开具发票，也可接收任何已接入 Peppol 的交易对手发来的发票。"
mp_incl4_t: "提交前校验"
mp_incl4_d: "抢在 LHDN 之前发现问题。内置校验涵盖税务合规性、数据完整性与业务规则。"
mp_incl5_t: "7 年归档 &amp; 审计轨迹"
mp_incl5_d: "自动留存单据，满足 LHDN 的保存要求，并提供全文检索与完整的审计历史。"
mp_incl6_t: "云端访问，任意设备"
mp_incl6_d: "用笔记本、平板或手机都能开票。无需安装，无需维护服务器——登录即用。"
mp_sr_h: "基于 Peppol 的完整发送 &amp; 接收能力"
mp_sr_sub: "BigLedger 是四角模型 Peppol 接入点，<strong>出站（发送）</strong>与<strong>入站（接收）</strong>两个方向的单据流均获完整支持，完全符合 MDEC 与 OpenPeppol 的规范。"
mp_sr_out_h: "发送（出站）"
mp_sr_out1: "<strong>开具合规电子发票</strong>，以 UBL 2.1 / PINT MY 格式，从 BigLedger 网页端、移动端或 API 发出。"
mp_sr_out2: "<strong>LHDN MyInvois 提交</strong>，通过认证 API 集成完成，自动进行 TIN 校验、签章与 QR 码嵌入。"
mp_sr_out3: "<strong>Peppol BIS Billing 3.0 / MY PINT</strong> 单据投递至国内及跨境任何已注册 Peppol 的交易对手。"
mp_sr_out4: "<strong>单据类型：</strong>发票、贷项通知单、借项通知单、自开发票、退款通知单。"
mp_sr_out5: "<strong>实时投递状态</strong>，支持自动重试、MLR（消息层级回执）处理与异常告警。"
mp_sr_in_h: "接收（入站）"
mp_sr_in1: "<strong>接收 Peppol 单据</strong>，来自全球任何四角模型接入点，直接路由至您的 BigLedger 收件箱。"
mp_sr_in2: "<strong>自动校验</strong>，依据 PINT MY / Peppol BIS schematron 规则执行，并将结构化的错误信息回传给发送方。"
mp_sr_in3: "<strong>入站单据类型：</strong>发票、贷项通知单、借项通知单、订单、订单回复、发货通知。"
mp_sr_in4: "<strong>自动匹配</strong>采购订单与收货单，一键过账至应付账款。"
mp_sr_in5: "<strong>Peppol 目录注册</strong>（SMP）由 BigLedger 代为处理，让贸易伙伴能够发现您的 Peppol ID 并正确寻址。"
mp_sr_note: "BigLedger 的 Peppol ID 格式为 <code>0230:&lt;your-LHDN-TIN&gt;</code>（马来西亚方案）。生产环境与预生产（测试）环境均由我们 24/7 运维与监控。"
mp_qual_h: "哪些企业符合资格"
mp_qual_sub: "这项由 MDEC 支持的优惠，专为备战 2025 年 7 月电子发票强制令的马来西亚企业而设。"
mp_qual1_t: "中小企业 &amp; 微型企业"
mp_qual1_d: "每月发票交易量在 200 笔以内的马来西亚中小型企业——零售、F&amp;B 餐饮、服务、贸易等各行各业皆适用。"
mp_qual2_t: "第三阶段强制实施企业"
mp_qual2_d: "自 2025 年 7 月 1 日起须遵守 LHDN 电子发票规定的所有马来西亚企业——不限行业。"
mp_qual3_t: "新用户 &amp; 系统迁移用户"
mp_qual3_d: "无论您目前使用手工开票、电子表格还是老旧系统，我们都提供快速且有专人引导的上线流程。"
mp_why_h: "为什么选择 BigLedger 处理马来西亚电子发票"
mp_why_sub: "仅有的 16 家 MDEC 认证供应商之一——也是唯一提供整整三年、每月 200 笔额度的服务商。"
mp_why1_t: "MDEC 全面认证"
mp_why1_d: "获马来西亚 Peppol 主管机构 MDEC 认证的 PEPPOL 服务供应商，已列入 MDEC 官方电子发票合作伙伴名录。"
mp_why2_t: "为马来西亚而生"
mp_why2_d: "原生支持 LHDN MyInvois、SST、EPF、SOCSO、PDPA 及本地银行对接——不是海外产品的二次改装。"
mp_why3_t: "随时准备好扩展"
mp_why3_d: "业务超过每月 200 笔？可无缝接入 BigLedger 完整 ERP：会计、POS、库存、电商、CRM，全部在同一个平台上。"
mp_sup_h: "已含支持服务"
mp_sup_sub: "参与 MDEC 优惠的每一家企业，都能获得完整的 BigLedger 支持配套——不额外收费。我们不会让您独自摸索合规问题。"
mp_sup1_t: "上线支持"
mp_sup1_d: "由专属上线顾问全程引导：公司资料建档、LHDN MyInvois 凭证绑定、在 SMP 目录注册 Peppol ID、会计科目映射，以及开出第一张测试发票——通常在 3 个工作日内完成。"
mp_sup2_t: "技术协助"
mp_sup2_d: "API 集成协助、UBL 2.1 / PINT MY 字段的数据映射、LHDN 校验退回排查、Peppol 投递异常处理，以及 webhook/SFTP 配置——全部由 BigLedger 驻马来西亚的工程团队负责。"
mp_sup3_t: "培训"
mp_sup3_d: "为您的财务与运营人员提供在线直播培训、随选视频教程、分步操作指南与速查手册——提供英文、马来文与中文三种语言版本。"
mp_sup4_t: "服务台"
mp_sup4_d: "多渠道服务台：邮件 <a href=\"mailto:support@bigledger.com\">support@bigledger.com</a>、应用内工单、Telegram 与 WhatsApp。工作时间内 4 个工作小时响应；重大问题 24/7 升级处理。"
mp_sup5_t: "知识库 &amp; 文档"
mp_sup5_d: "完整的公开文档托管于 <a href=\"https://wiki.bigledger.com/\" target=\"_blank\" rel=\"noopener\">wiki.bigledger.com</a>，涵盖 LHDN 合规指南、Peppol 配置、API 参考与常见问题，并随 LHDN 与 MDEC 发布新规则持续更新。"
mp_sup6_t: "持续合规更新"
mp_sup6_d: "每当 LHDN 或 MDEC 发布变更，BigLedger 都会自动更新数据结构、校验规则与单据模板——您无需动手，也能始终保持合规。"
mp_claim_h: "如何领取您的免费电子发票配套"
mp_claim_sub: "三个简单步骤即可合规——多数企业在一周内即可正式使用。"
mp_claim1_t: "联系我们"
mp_claim1_d: "通过 Telegram <a href=\"https://t.me/leehongfay\" target=\"_blank\" rel=\"noopener\"><strong>@leehongfay</strong></a> 或邮件 <a href=\"mailto:sales@bigledger.com\"><strong>sales@bigledger.com</strong></a> 与我们联系，并注明 MDEC 优惠。"
mp_claim2_t: "快速上线"
mp_claim2_d: "我们会核实您的企业资料，建立公司档案，并与您一同配置 LHDN MyInvois 凭证。"
mp_claim3_t: "开始开具电子发票"
mp_claim3_d: "当天即可开出第一张合规电子发票。每月 200 笔交易免费，整整三年。"
mp_faq_h: "常见问题"
mp_faq1_q: "这项优惠真的免费吗？有没有隐藏收费？"
mp_faq1_a: "是的，每月最多 200 笔发票交易，三年内确实完全免费。没有开通费，也无需信用卡。这是 BigLedger 在 MDEC 国家电子发票倡议下的承诺，旨在协助马来西亚中小企业采用电子发票。"
mp_faq2_q: "什么算作一笔交易？"
mp_faq2_a: "一笔交易 = 一张成功提交至 LHDN MyInvois 门户的发票、贷项通知单或借项通知单。草稿、校验以及同一份单据的重新提交均不计入。"
mp_faq3_q: "三年之后怎么办？如果每月超过 200 笔呢？"
mp_faq3_a: "您可以按标准价格无缝升级到 BigLedger 付费方案。数据、设置与历史记录全部保留——无需迁移。"
mp_faq4_q: "这项优惠涵盖 PEPPOL 跨境开票吗？"
mp_faq4_a: "涵盖。BigLedger 是获 MDEC 认证的 Peppol 接入点，具备完整的四角模型收发能力，因此您可以在每月 200 笔额度内，通过国际 Peppol 网络开具与接收发票。"
mp_faq5_q: "BigLedger 能同时通过 Peppol 发送和接收发票吗？"
mp_faq5_a: "可以——BigLedger 运营完整的四角模型 Peppol 接入点。<strong>发送方面：</strong>可以 UBL 2.1 / PINT MY 格式开具发票、贷项通知单、借项通知单、自开发票与退款通知单，发送至 LHDN MyInvois 以及全球任何 Peppol 交易对手。<strong>接收方面：</strong>可从任何 Peppol 接入点接收入站的发票、贷项通知单、借项通知单、订单、订单回复与发货通知，并自动完成校验、MLR 回执与应付账款自动匹配。"
mp_faq6_q: "上线期间及之后能获得哪些支持？"
mp_faq6_a: "本优惠包含完整的 BigLedger 支持配套，不额外收费：专属上线顾问（通常 3 个工作日内上线）、由驻马来西亚工程团队提供的技术协助、英文／马来文／中文的直播与随选培训、多渠道服务台（邮件、应用内、Telegram、WhatsApp）并在工作时间内 4 小时响应、重大问题 24/7 升级处理，另有每当 LHDN 或 MDEC 发布新规则时的自动合规更新。"
mp_faq7_q: "我可以对接现有的会计系统吗？"
mp_faq7_a: "当然可以。BigLedger 提供 REST API、SFTP 批量导入以及 CSV/Excel 上传等多种方式，常见系统的对接方案开箱即用。"
mp_faq8_q: "我的数据存放在马来西亚吗？"
mp_faq8_a: "是的。BigLedger 将数据托管于马来西亚境内的数据中心，符合 PDPA 与 LHDN 的 7 年留存规定。"
mp_faq9_q: "我要如何确认 BigLedger 确实是 MDEC 倡议的官方成员？"
mp_faq9_a: "BigLedger 已列名于 <a href=\"https://www.mdec.my/national-einvoicing/freemium-and-affordable-solutions\" target=\"_blank\" rel=\"noopener\">MDEC「免费 &amp; 经济型解决方案」页面</a>的 16 家认证供应商之中。"
mp_test_h: "测试环境 &amp; 演示访问"
mp_test_sub: "面向 MDEC 评审人员、认证合作伙伴，以及希望在正式合作前先验证 Peppol 收发能力的潜在客户。"
mp_test1_tag: "沙盒环境 · 供外部测试者使用"
