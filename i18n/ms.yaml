# ── Pricing / Contact / Developers pages ─────────────────
price_eyebrow: "Harga"
price_hero_h: "Telus. Fleksibel.<br>Dibina untuk perniagaan anda."
price_hero_sub: "Tiada yuran kerusi. Tiada modul tersembunyi. Tiada kejutan. Harga BigLedger disesuaikan dengan perniagaan anda secara tepat — modul yang anda perlukan, skala operasi anda, dan tahap sokongan yang anda kehendaki."
price_incl_label: "SETIAP PELAN MERANGKUMI"
price_incl_title: "Tiada kompromi pada perkara yang penting"
price_incl_desc: "Sama ada anda peruncit satu cawangan atau perusahaan pelbagai entiti, keupayaan ini disertakan sebagai standard dengan setiap penggunaan BigLedger."
price_incl1_t: "Akses Ciri Lengkap"
price_incl1_d: "Akses penuh kepada semua modul dan ciri dalam pelan anda — tiada apa-apa yang dikunci di sebalik tambahan."
price_incl2_t: "Pematuhan Malaysia"
price_incl2_d: "E-Invoice, PEPPOL, SST, EPF, SOCSO, PCB — terbina dalam sepenuhnya, sentiasa terkini."
price_incl3_t: "Infrastruktur Awan"
price_incl3_d: "SLA masa operasi 99.9%, sandaran automatik, dan pusat data Malaysia dengan penyulitan gred bank."
price_incl4_t: "Akses Mudah Alih"
price_incl4_d: "Aplikasi iOS dan Android asli disertakan. Perniagaan anda berjalan di mana sahaja pasukan anda berada."
price_incl5_t: "Kemas Kini Berkala"
price_incl5_d: "Ciri baharu, kemas kini kawal selia, dan penambahbaikan prestasi dihantar secara automatik — tiada yuran naik taraf."
price_incl6_t: "Keselamatan & Pematuhan"
price_incl6_d: "Infrastruktur diperakui ISO 27001. Kawalan akses berasaskan peranan. Log audit pada setiap tindakan."
price_cq_label: "SEBUT HARGA TERSUAI"
price_cq_h: "Diharga mengikut<br>keperluan sebenar anda"
price_cq_p1: "Kami tidak menjual anda lesen perusahaan yang membengkak apabila penggunaan yang fokus adalah apa yang anda perlukan sebenarnya. Setiap sebut harga BigLedger dibina mengikut apa yang perniagaan anda gunakan — bukan apa yang penjual mahu jual lebih."
price_cq_p2: "Berbincang dengan pasukan kami dan dapatkan sebut harga yang jelas dan terperinci dalam masa 24 jam. Tiada tekanan, tiada perbualan terikat — hanya harga telus untuk platform yang perniagaan anda layak dapat."
price_pf_title: "Sebut harga anda berdasarkan"
price_pf1_n: "Bilangan pengguna"
price_pf1_s: "Pengguna bernama dengan kebenaran berasaskan peranan"
price_pf2_n: "Modul diperlukan"
price_pf2_s: "Pilih daripada 100+ modul perniagaan boleh gabung"
price_pf3_n: "Volum transaksi"
price_pf3_s: "Dioptimumkan untuk beban transaksi bulanan anda"
price_pf4_n: "Keperluan integrasi"
price_pf4_s: "Sistem sedia ada, pasaran, gerbang pembayaran"
price_pf5_n: "Tahap sokongan"
price_pf5_s: "Sokongan standard, keutamaan, atau perusahaan khusus"
price_faq_label: "SOALAN LAZIM"
price_faq_title: "Soalan lazim"
price_faq1_q: "Adakah terdapat percubaan percuma?"
price_faq1_a: "Ya. Kami menawarkan tempoh percubaan berciri penuh supaya anda boleh mengesahkan BigLedger terhadap aliran kerja sebenar anda sebelum membuat komitmen. Hubungi pasukan kami untuk mengatur akses."
price_faq2_q: "Bolehkah saya menaik atau menurun taraf pelan saya?"
price_faq2_a: "Sudah tentu. Pelan direka untuk berkembang bersama anda — tambah modul, pengguna, atau kapasiti transaksi apabila perniagaan anda berkembang. Menurun taraf juga disokong sama."
price_faq3_q: "Apakah kaedah pembayaran yang diterima?"
price_faq3_a: "Kami menerima Visa, Mastercard, Amex, pindahan bank, dan perbankan dalam talian FPX. Kontrak tahunan disertakan diskaun yang bermakna berbanding pengebilan bulanan."
price_faq4_q: "Adakah data saya selamat dan disimpan di Malaysia?"
price_faq4_a: "Ya. Semua data disimpan di pusat data Malaysia, disulitkan semasa rehat dan dalam transit, dengan infrastruktur diperakui ISO 27001 dan sandaran automatik harian."
price_faq5_q: "Bagaimana pula dengan latihan dan permulaan penggunaan?"
price_faq5_a: "Semua pelan merangkumi dokumentasi, tutorial video, dan pasukan permulaan penggunaan khusus. Sesi latihan tersuai dan bantuan pemindahan data tersedia berdasarkan tahap pelan anda."
price_cta_label: "DAPATKAN SEBUT HARGA ANDA"
price_cta_h: "Dapatkan sebut harga peribadi<br>dalam masa 24 jam."
price_cta_sub: "Berbincang dengan pasukan kami. Kami akan mengkonfigurasi pelan mengikut industri anda, modul anda, dan skala anda — dan memberi anda angka yang jelas."
