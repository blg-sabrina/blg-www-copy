mp_cta_tg: "Tuntut melalui Telegram @leehongfay"
mp_about_h: "Mengenai Inisiatif E-Penginvoisan Kebangsaan MDEC"
mp_about_p1: "MDEC — Pihak Berkuasa Peppol Malaysia — melancarkan <strong>Inisiatif E-Penginvoisan Kebangsaan</strong> di bawah Pemangkin Malaysia Digital bagi membantu perniagaan beralih dengan lancar kepada e-penginvoisan yang diwajibkan LHDN. Program Freemium &amp; Affordable Solutions menggandingkan MDEC dengan <strong>16 penyedia penyelesaian bertauliah</strong>, termasuk <strong>BigLedger</strong>, untuk menawarkan PKS Malaysia pakej e-penginvoisan percuma atau berdiskaun tinggi."
mp_about_p2: "Inisiatif ini menyokong pelaksanaan e-invois berperingkat Malaysia, yang menjadi mandatori untuk semua perniagaan pada <strong>1 Julai 2025</strong>. Tawaran BigLedger disenaraikan di <a href=\"https://www.mdec.my/national-einvoicing/freemium-and-affordable-solutions\" target=\"_blank\" rel=\"noopener\">halaman rasmi MDEC Freemium &amp; Affordable Solutions</a>."
mp_incl_h: "Apa Yang Disertakan Dalam Promosi Ini"
mp_incl_sub: "Segala yang anda perlukan untuk mengeluarkan e-invois Malaysia yang patuh — tiada yuran tersembunyi, tiada kad kredit diperlukan."
mp_incl1_t: "Applet Penjanaan E-Invois"
mp_incl1_d: "Hasilkan e-invois yang patuh LHDN dengan pengesahan TIN automatik, pengiraan cukai, dan pemformatan UBL 2.1 sedia digunakan."
mp_incl2_t: "Penghantaran Terus MyInvois"
mp_incl2_d: "Hantar terus ke portal MyInvois LHDN melalui integrasi API bertauliah, dengan cubaan semula automatik dan penjejakan status masa nyata."
mp_incl3_t: "Hantar &amp; Terima PEPPOL"
mp_incl3_d: "Pertukaran Peppol dua hala sepenuhnya — keluarkan invois keluar dan terima invois masuk daripada mana-mana rakan niaga yang bersambung dengan Peppol, melalui Access Point BigLedger yang bertauliah MDEC."
mp_incl4_t: "Pengesahan Sebelum Penghantaran"
mp_incl4_d: "Kesan ralat sebelum LHDN mengesannya. Semakan pengesahan terbina dalam untuk pematuhan cukai, kelengkapan data, dan peraturan perniagaan."
mp_incl5_t: "Arkib &amp; Jejak Audit 7 Tahun"
mp_incl5_d: "Penyimpanan dokumen automatik yang memenuhi keperluan LHDN, dengan carian teks penuh dan sejarah audit yang lengkap."
mp_incl6_t: "Akses Awan, Sebarang Peranti"
mp_incl6_d: "Keluarkan invois daripada komputer riba, tablet, atau telefon anda. Tiada pemasangan, tiada penyelenggaraan pelayan — hanya log masuk dan mula."
mp_sr_h: "Keupayaan Hantar &amp; Terima Sepenuhnya melalui Peppol"
mp_sr_sub: "BigLedger ialah Peppol Access Point 4-penjuru — kedua-dua aliran dokumen <strong>keluar (menghantar)</strong> dan <strong>masuk (menerima)</strong> disokong sepenuhnya, selaras dengan spesifikasi MDEC dan OpenPeppol."
mp_sr_out_h: "Menghantar (Keluar)"
mp_sr_out1: "<strong>Keluarkan e-invois yang patuh</strong> dalam format UBL 2.1 / PINT MY daripada aplikasi web, aplikasi mudah alih, atau API BigLedger."
mp_sr_out2: "<strong>Penghantaran LHDN MyInvois</strong> melalui integrasi API bertauliah dengan pengesahan TIN automatik, penandatanganan, dan pembenaman kod QR."
mp_sr_out3: "<strong>Peppol BIS Billing 3.0 / MY PINT</strong> dihantar kepada mana-mana rakan niaga berdaftar Peppol di dalam dan luar negara."
mp_sr_out4: "<strong>Jenis dokumen:</strong> Invois, Nota Kredit, Nota Debit, Invois Bil Sendiri, Nota Bayaran Balik."
mp_sr_out5: "<strong>Status penghantaran masa nyata</strong> dengan cubaan semula automatik, pengendalian MLR (Message Level Response), dan makluman pengecualian."
mp_sr_in_h: "Menerima (Masuk)"
mp_sr_in1: "<strong>Terima dokumen Peppol</strong> daripada mana-mana Access Point 4-penjuru di seluruh dunia, dihalakan terus ke peti masuk BigLedger anda."
mp_sr_in2: "<strong>Pengesahan automatik</strong> terhadap peraturan schematron PINT MY / Peppol BIS dengan pelaporan ralat berstruktur kembali kepada penghantar."
mp_sr_in3: "<strong>Jenis dokumen masuk:</strong> Invois, Nota Kredit, Nota Debit, Pesanan, Respons Pesanan, Nasihat Penghantaran."
mp_sr_in4: "<strong>Padanan automatik</strong> dengan pesanan belian dan resit barangan, serta pengeposan sekali klik ke dalam Akaun Belum Bayar."
mp_sr_in5: "<strong>Pendaftaran Peppol Directory</strong> (SMP) diuruskan oleh BigLedger supaya rakan niaga dapat menemui dan menghalakan dokumen ke Peppol ID anda."
mp_sr_note: "Format Peppol ID BigLedger: <code>0230:&lt;your-LHDN-TIN&gt;</code> (skema Malaysia). Kedua-dua persekitaran produksi dan pra-produksi (ujian) dikendalikan dan dipantau 24/7."
mp_qual_h: "Siapa Yang Layak"
mp_qual_sub: "Promosi sokongan MDEC ini direka untuk perniagaan Malaysia yang bersiap sedia menghadapi mandat e-invois Julai 2025."
mp_qual1_t: "PKS &amp; Perniagaan Mikro"
mp_qual1_d: "Perusahaan kecil dan sederhana Malaysia dengan sehingga 200 transaksi invois sebulan — peruncitan, F&amp;B, perkhidmatan, perdagangan, dan lain-lain."
mp_qual2_t: "Perniagaan Mandat Fasa 3"
mp_qual2_d: "Mana-mana perniagaan Malaysia yang dikehendaki mematuhi e-penginvoisan LHDN mulai 1 Julai 2025 — tanpa mengira industri."
mp_qual3_t: "Pengguna Baharu &amp; Peralihan"
mp_qual3_d: "Sama ada anda beralih daripada penginvoisan manual, hamparan, atau sistem lama, proses onboarding adalah pantas dan berpandu."
mp_why_h: "Mengapa BigLedger untuk E-Invois Malaysia"
mp_why_sub: "Antara hanya 16 penyedia bertauliah MDEC — dan satu-satunya yang memberi anda tempoh penuh 3 tahun pada 200 transaksi/bulan."
mp_why1_t: "Bertauliah Penuh MDEC"
mp_why1_d: "Penyedia Perkhidmatan PEPPOL yang disahkan di bawah MDEC, Pihak Berkuasa Peppol Malaysia. Disenaraikan dalam direktori rakan e-penginvoisan rasmi MDEC."
mp_why2_t: "Dibina untuk Malaysia"
mp_why2_d: "Sokongan asli untuk LHDN MyInvois, SST, EPF, SOCSO, PDPA, dan integrasi bank tempatan — bukan produk luar negara yang diubah suai."
mp_why3_t: "Berkembang Bila Anda Bersedia"
mp_why3_d: "Melangkaui 200/bulan? Sambung ke ERP penuh BigLedger: perakaunan, POS, inventori, e-dagang, CRM — semuanya pada satu platform."
mp_sup_h: "Perkhidmatan Sokongan Disertakan"
mp_sup_sub: "Setiap perniagaan dalam promosi MDEC menerima pakej sokongan BigLedger yang lengkap — tanpa kos tambahan. Kami tidak membiarkan anda menangani pematuhan bersendirian."
mp_sup1_t: "Sokongan Onboarding"
mp_sup1_d: "Persediaan berpandu bersama pakar onboarding khusus: profil syarikat, pemautan kredensial LHDN MyInvois, pendaftaran Peppol ID dalam direktori SMP, pemetaan carta akaun, dan invois ujian pertama anda — lazimnya siap dalam 3 hari bekerja."
mp_sup2_t: "Bantuan Teknikal"
mp_sup2_d: "Bantuan integrasi API, pemetaan data untuk medan UBL 2.1 / PINT MY, penyelesaian masalah penolakan pengesahan LHDN, pengecualian penghantaran Peppol, dan persediaan webhook/SFTP — dikendalikan oleh pasukan kejuruteraan BigLedger yang berpangkalan di Malaysia."
mp_sup3_t: "Latihan"
mp_sup3_d: "Sesi latihan dalam talian secara langsung untuk kakitangan kewangan dan operasi anda, tutorial video atas permintaan, panduan pengguna langkah demi langkah, dan lembaran rujukan pantas — kesemuanya dalam bahasa Inggeris, Bahasa Malaysia, dan Mandarin."
mp_sup4_t: "Meja Bantuan"
mp_sup4_d: "Meja bantuan pelbagai saluran: e-mel <a href=\"mailto:support@bigledger.com\">support@bigledger.com</a>, tiket dalam aplikasi, Telegram, dan WhatsApp. Maklum balas waktu perniagaan dalam 4 jam bekerja; eskalasi isu kritikal 24/7."
mp_sup5_t: "Pangkalan Pengetahuan &amp; Dokumentasi"
mp_sup5_d: "Dokumentasi awam penuh di <a href=\"https://wiki.bigledger.com/\" target=\"_blank\" rel=\"noopener\">wiki.bigledger.com</a>, termasuk panduan pematuhan LHDN, konfigurasi Peppol, rujukan API, dan Soalan Lazim. Dikemas kini secara berterusan apabila LHDN dan MDEC menerbitkan peraturan baharu."
mp_sup6_t: "Kemas Kini Pematuhan Berterusan"
mp_sup6_d: "BigLedger mengemas kini skema, peraturan pengesahan, dan templat dokumen secara automatik setiap kali LHDN atau MDEC menerbitkan perubahan — jadi anda kekal patuh tanpa perlu berbuat apa-apa."
mp_claim_h: "Cara Menuntut Pakej E-Invois Percuma Anda"
mp_claim_sub: "Tiga langkah mudah untuk mematuhi peraturan — kebanyakan perniagaan beroperasi dalam masa seminggu."
mp_claim1_t: "Hubungi Kami"
mp_claim1_d: "Hubungi kami melalui Telegram <a href=\"https://t.me/leehongfay\" target=\"_blank\" rel=\"noopener\"><strong>@leehongfay</strong></a> atau e-mel <a href=\"mailto:sales@bigledger.com\"><strong>sales@bigledger.com</strong></a>. Sebutkan promosi MDEC."
mp_claim2_t: "Onboarding Pantas"
mp_claim2_d: "Kami akan mengesahkan butiran perniagaan anda, menyediakan profil syarikat anda, dan mengkonfigurasi kredensial LHDN MyInvois bersama anda."
mp_claim3_t: "Mula Mengeluarkan E-Invois"
mp_claim3_d: "Keluarkan e-invois patuh pertama anda pada hari yang sama. Percuma untuk 200 transaksi/bulan, selama 3 tahun penuh."
mp_faq_h: "Soalan Lazim"
mp_faq1_q: "Adakah promosi ini benar-benar percuma? Ada caj tersembunyi?"
mp_faq1_a: "Ya, benar-benar percuma selama 3 tahun untuk sehingga 200 transaksi invois sebulan. Tiada yuran persediaan, tiada kad kredit diperlukan. Ini sebahagian daripada komitmen BigLedger di bawah Inisiatif E-Penginvoisan Kebangsaan MDEC untuk membantu PKS Malaysia menerima pakai e-penginvoisan."
mp_faq2_q: "Apakah yang dikira sebagai satu transaksi?"
mp_faq2_a: "Satu transaksi = satu invois, nota kredit, atau nota debit yang berjaya dihantar ke portal MyInvois LHDN. Draf, pengesahan, dan penghantaran semula dokumen yang sama tidak dikira."
mp_faq3_q: "Apa yang berlaku selepas 3 tahun, atau jika saya melebihi 200/bulan?"
mp_faq3_a: "Anda boleh menaik taraf dengan lancar ke pelan BigLedger berbayar pada harga standard. Data, tetapan, dan sejarah anda dibawa bersama — tiada migrasi diperlukan."
mp_faq4_q: "Adakah ini merangkumi penginvoisan rentas sempadan PEPPOL?"
mp_faq4_a: "Ya. BigLedger ialah Peppol Access Point bertauliah MDEC dengan keupayaan hantar dan terima 4-penjuru sepenuhnya, jadi anda boleh mengeluarkan dan menerima invois merentasi rangkaian Peppol antarabangsa dalam peruntukan 200/bulan anda."
mp_faq5_q: "Bolehkah BigLedger menghantar dan menerima invois melalui Peppol?"
mp_faq5_a: "Ya — BigLedger mengendalikan Peppol Access Point 4-penjuru yang lengkap. <strong>Menghantar:</strong> keluarkan invois, nota kredit, nota debit, invois bil sendiri dan nota bayaran balik dalam format UBL 2.1 / PINT MY ke LHDN MyInvois dan kepada mana-mana rakan niaga Peppol di seluruh dunia. <strong>Menerima:</strong> terima invois masuk, nota kredit, nota debit, pesanan, respons pesanan dan nasihat penghantaran daripada mana-mana Peppol Access Point, dengan pengesahan automatik, maklum balas MLR, dan padanan automatik AP."
mp_faq6_q: "Apakah sokongan yang saya dapat semasa dan selepas onboarding?"
mp_faq6_a: "Promosi ini merangkumi pakej sokongan BigLedger yang lengkap tanpa kos tambahan: pakar onboarding khusus (lazimnya beroperasi dalam 3 hari bekerja), bantuan teknikal daripada pasukan kejuruteraan kami yang berpangkalan di Malaysia, latihan secara langsung dan atas permintaan dalam bahasa Inggeris / Bahasa Malaysia / Mandarin, meja bantuan pelbagai saluran (e-mel, dalam aplikasi, Telegram, WhatsApp) dengan maklum balas 4 jam waktu perniagaan dan eskalasi kritikal 24/7, serta kemas kini pematuhan automatik setiap kali LHDN atau MDEC menerbitkan peraturan baharu."
mp_faq7_q: "Bolehkah saya mengintegrasikan sistem perakaunan sedia ada saya?"
mp_faq7_a: "Sudah tentu. BigLedger menyediakan REST API, import kelompok SFTP, dan pilihan muat naik CSV/Excel. Integrasi popular tersedia sedia digunakan."
mp_faq8_q: "Adakah data saya disimpan di Malaysia?"
mp_faq8_a: "Ya. BigLedger menghoskan data di pusat data Malaysia, mematuhi PDPA dan peraturan penyimpanan 7 tahun LHDN."
mp_faq9_q: "Bagaimanakah saya boleh mengesahkan BigLedger secara rasmi sebahagian daripada inisiatif MDEC?"
mp_faq9_a: "BigLedger disenaraikan antara 16 penyedia bertauliah di <a href=\"https://www.mdec.my/national-einvoicing/freemium-and-affordable-solutions\" target=\"_blank\" rel=\"noopener\">halaman MDEC Freemium &amp; Affordable Solutions</a>."
