ei_pp_label: "AKREDITASI PEPPOL"
ei_pp_h: "Rangkaian antarabangsa,<br>bukan penyelesaian sementara tempatan"
ei_pp_p1: "PEPPOL (Pan-European Public Procurement On-Line) membolehkan perniagaan bertukar dokumen elektronik dengan lancar merentas sempadan. Akreditasi ini bukan lencana yang kami beli — ia status yang diaudit dan mengawal cara dokumen disahkan, ditandatangani, dan dihantar bagi pihak anda."
ei_pp_p2: "BigLedger memegang akreditasi penuh daripada Malaysia Digital Economy Corporation (MDEC), menjadikan kami saluran yang diiktiraf untuk perniagaan Malaysia yang bersiap sedia untuk e-invois wajib, syarikat antarabangsa yang berurus niaga dengan entiti Malaysia, agensi kerajaan yang memerlukan transaksi patuh PEPPOL, dan PKS yang memerlukan laluan pematuhan yang berpatutan."
