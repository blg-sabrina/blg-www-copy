dev_eyebrow: "Platform Pembangun"
dev_hero_h1: "Bina di atas"
dev_hero_h2: "Business OS"
dev_hero_sub: "REST API yang komprehensif, webhook, dan rangka kerja applet boleh dikembangkan — segala yang anda perlukan untuk menyepadukan sistem sedia ada, mengautomasikan aliran kerja, dan membina modul khusus industri di atas BigLedger."
dev_qs_label: "MULA PANTAS"
dev_qs_title: "Dari sifar ke bersepadu dalam beberapa minit"
dev_qs_desc: "API BigLedger adalah RESTful, JSON asli, dan didokumenkan dengan contoh interaktif dalam setiap bahasa yang penting."
dev_step1_t: "Minta Akses API"
dev_step1_d: "Hubungi pasukan pembangun kami untuk menerima kelayakan anda, dokumentasi endpoint, dan persekitaran sandbox yang dimuat awal dengan data ujian."
dev_step1_link: "Minta akses"
dev_step2_t: "Teroka Rujukan API"
dev_step2_d: "Dokumentasi REST API lengkap dengan sampel kod dalam JavaScript, Python, PHP, Java, .NET, dan Go. Contoh interaktif berjalan terus dalam pelayar."
dev_step2_link: "Lihat dokumen API"
dev_step3_t: "Bina & Sebarkan"
dev_step3_d: "Gunakan SDK rasmi kami, langgan webhook untuk acara masa nyata, atau bina applet tersuai sepenuhnya yang berjalan secara asli dalam antara muka BigLedger."
dev_step3_link: "Baca panduan"
dev_res_label: "SUMBER"
dev_res_title: "Segala yang anda perlukan untuk membina"
dev_res1_t: "Rujukan REST API"
dev_res1_d: "Dokumentasi endpoint lengkap dengan skema permintaan/respons, panduan pengesahan, dan butiran had kadar."
dev_res2_t: "SDK Rasmi"
dev_res2_d: "Pustaka klien selamat jenis untuk JavaScript/TypeScript, Python, PHP, Java, .NET, dan Go — diselenggara dan diuji oleh pasukan kami."
dev_res3_t: "Webhook"
dev_res3_d: "Pemberitahuan acara masa nyata untuk penciptaan invois, perubahan inventori, kemas kini pesanan, pemprosesan pembayaran, dan acara perniagaan tersuai."
dev_res3_tags: "HTTPS · Logik cuba semula · Tandatangan"
dev_res4_t: "Applet Tersuai"
dev_res4_d: "Bina modul khusus industri, aliran kerja tersuai, atau penyelesaian label putih yang berjalan secara asli dalam antara muka BigLedger."
dev_res5_t: "Tutorial & Panduan"
dev_res5_d: "Panduan langkah demi langkah untuk integrasi e-dagang, automasi e-invois, penyegerakan perakaunan, dan pembangunan applet tersuai."
dev_res5_tags: "Video · Bertulis · Interaktif"
dev_res6_t: "Persekitaran Sandbox"
dev_res6_d: "Persekitaran ujian terpencil sepenuhnya yang dimuat awal dengan data sampel — bangun dan uji tanpa menyentuh sistem pengeluaran."
dev_res6_tags: "Pariti API penuh · Set semula bila-bila masa"
