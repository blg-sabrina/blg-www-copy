# ── MDEC E-Invoice promotion page ─────────────────────
mp_hero_badge: "المبادرة الوطنية للفوترة الإلكترونية من MDEC · شريك معتمد رسميًا"
mp_hero_title: "فوترة إلكترونية مجانية في ماليزيا لمدة 3 سنوات"
mp_hero_sub: "بصفتها <strong>مزوّد خدمة PEPPOL معتمدًا اعتمادًا كاملاً من MDEC</strong>، يسر BigLedger المشاركة في المبادرة الوطنية للفوترة الإلكترونية من MDEC — لمساعدة الشركات الماليزية الصغيرة والمتوسطة على الامتثال لمتطلبات الفوترة الإلكترونية لدى LHDN دون أي تكلفة."
mp_offer_tag: "عرض ترويجي محدود · عرض شركاء MDEC"
mp_offer_headline: "أبلتات الفوترة الإلكترونية الماليزية من BigLedger مجانًا"
mp_metric1: "معاملة شهريًا"
mp_metric2: "سنوات مجانية"
mp_metric3: "تكلفة الاشتراك"
mp_offer_note: "إصدار BigLedger MDEC للفوترة الإلكترونية 2025 · يشمل الامتثال الكامل لـ LHDN MyInvois &amp; PEPPOL"
mp_cta_tg: "احصل على العرض عبر Telegram @leehongfay"
mp_about_h: "عن المبادرة الوطنية للفوترة الإلكترونية من MDEC"
mp_about_p1: "أطلقت MDEC — الهيئة الماليزية المسؤولة عن Peppol — <strong>المبادرة الوطنية للفوترة الإلكترونية</strong> ضمن برنامج Pemangkin Malaysia Digital لمساعدة الشركات على الانتقال بسلاسة إلى الفوترة الإلكترونية الإلزامية من LHDN. ويجمع برنامج الحلول المجانية &amp; الميسورة بين MDEC و<strong>16 مزوّد حلول معتمدًا</strong>، من بينهم <strong>BigLedger</strong>، لتقديم باقات فوترة إلكترونية مجانية أو بخصومات كبيرة للشركات الماليزية الصغيرة والمتوسطة."
mp_about_p2: "تدعم المبادرة الطرح التدريجي للفوترة الإلكترونية في ماليزيا، والذي يصبح إلزاميًا لجميع الشركات في <strong>1 يوليو 2025</strong>. وعرض BigLedger مدرج على <a href=\"https://www.mdec.my/national-einvoicing/freemium-and-affordable-solutions\" target=\"_blank\" rel=\"noopener\">صفحة MDEC الرسمية للحلول المجانية &amp; الميسورة</a>."
mp_incl_h: "ما الذي يشمله هذا العرض"
mp_incl_sub: "كل ما تحتاجه لإصدار فواتير إلكترونية ماليزية متوافقة — دون رسوم خفية ودون الحاجة إلى بطاقة ائتمان."
mp_incl1_t: "أبلت إنشاء الفواتير الإلكترونية"
mp_incl1_d: "أنشئ فواتير إلكترونية متوافقة مع LHDN مع تحقق آلي من TIN وحساب تلقائي للضرائب وتنسيق UBL 2.1 جاهز من البداية."
mp_incl2_t: "الإرسال المباشر إلى MyInvois"
mp_incl2_d: "أرسل مباشرة إلى بوابة MyInvois التابعة لـ LHDN عبر تكامل API معتمد، مع إعادة محاولة تلقائية وتتبع للحالة في الوقت الفعلي."
mp_incl3_t: "الإرسال &amp; الاستقبال عبر PEPPOL"
mp_incl3_d: "تبادل ثنائي الاتجاه كامل عبر Peppol — أصدر فواتيرك الصادرة واستقبل الفواتير الواردة من أي طرف متصل بشبكة Peppol، من خلال نقطة الوصول المعتمدة من MDEC لدى BigLedger."
mp_incl4_t: "التحقق قبل الإرسال"
mp_incl4_d: "اكتشف الأخطاء قبل أن تكتشفها LHDN. فحوصات تحقق مدمجة للامتثال الضريبي واكتمال البيانات وقواعد العمل."
mp_incl5_t: "أرشفة 7 سنوات &amp; سجل تدقيق"
mp_incl5_d: "حفظ تلقائي للمستندات يلبي متطلبات LHDN، مع بحث في النص الكامل وسجل تدقيق شامل."
mp_incl6_t: "وصول سحابي من أي جهاز"
mp_incl6_d: "أصدر الفواتير من حاسوبك المحمول أو جهازك اللوحي أو هاتفك. دون تثبيت ودون صيانة خوادم — ما عليك سوى تسجيل الدخول والبدء."
mp_sr_h: "قدرة كاملة على الإرسال &amp; الاستقبال عبر Peppol"
mp_sr_sub: "BigLedger هي نقطة وصول Peppol رباعية الأركان — فتدفقات المستندات <strong>الصادرة (الإرسال)</strong> و<strong>الواردة (الاستقبال)</strong> مدعومة بالكامل، بما يتوافق مع مواصفات MDEC وOpenPeppol."
mp_sr_out_h: "الإرسال (الصادر)"
mp_sr_out1: "<strong>أصدر فواتير إلكترونية متوافقة</strong> بتنسيق UBL 2.1 / PINT MY من تطبيق الويب أو تطبيق الجوال أو API لدى BigLedger."
mp_sr_out2: "<strong>الإرسال إلى LHDN MyInvois</strong> عبر تكامل API معتمد مع تحقق آلي من TIN وتوقيع رقمي وتضمين رمز QR."
mp_sr_out3: "<strong>إرسال بمعيار Peppol BIS Billing 3.0 / MY PINT</strong> إلى أي طرف مسجل في Peppol محليًا وعبر الحدود."
mp_sr_out4: "<strong>أنواع المستندات:</strong> فاتورة، إشعار دائن، إشعار مدين، فاتورة ذاتية الإصدار، إشعار استرداد."
mp_sr_out5: "<strong>حالة تسليم في الوقت الفعلي</strong> مع إعادة محاولة تلقائية ومعالجة MLR (استجابة على مستوى الرسالة) وتنبيهات للحالات الاستثنائية."
mp_sr_in_h: "الاستقبال (الوارد)"
mp_sr_in1: "<strong>استقبل مستندات Peppol</strong> من أي نقطة وصول رباعية الأركان حول العالم، موجهة إلى صندوق الوارد لديك في BigLedger."
mp_sr_in2: "<strong>تحقق تلقائي</strong> وفق قواعد schematron الخاصة بـ PINT MY / Peppol BIS مع تقارير أخطاء منظمة تُعاد إلى المرسل."
mp_sr_in3: "<strong>أنواع المستندات الواردة:</strong> فاتورة، إشعار دائن، إشعار مدين، أمر شراء، رد على أمر الشراء، إشعار شحن."
mp_sr_in4: "<strong>مطابقة تلقائية</strong> مع أوامر الشراء وإشعارات استلام البضائع، مع ترحيل بنقرة واحدة إلى الحسابات الدائنة."
mp_sr_in5: "<strong>التسجيل في دليل Peppol</strong> (SMP) تتولاه BigLedger نيابة عنك حتى يتمكن شركاؤك التجاريون من العثور على معرّف Peppol الخاص بك والتوجيه إليه."
mp_sr_note: "صيغة معرّف Peppol لدى BigLedger: <code>0230:&lt;your-LHDN-TIN&gt;</code> (مخطط ماليزيا). وتُشغَّل بيئتا الإنتاج وما قبل الإنتاج (الاختبار) وتُراقَبان على مدار 24/7."
mp_qual_h: "من المؤهل للعرض"
mp_qual_sub: "صُمم هذا العرض المدعوم من MDEC للشركات الماليزية التي تستعد لإلزامية الفوترة الإلكترونية في يوليو 2025."
mp_qual1_t: "الشركات الصغيرة &amp; متناهية الصغر"
mp_qual1_d: "المنشآت الماليزية الصغيرة والمتوسطة التي تصل معاملاتها إلى 200 فاتورة شهريًا — التجزئة والأغذية &amp; المشروبات والخدمات والتجارة وغيرها."
mp_qual2_t: "شركات المرحلة الثالثة الإلزامية"
mp_qual2_d: "أي شركة ماليزية مُلزَمة بالامتثال للفوترة الإلكترونية لدى LHDN اعتبارًا من 1 يوليو 2025 — أيًا كان قطاعها."
mp_qual3_t: "المستخدمون الجدد &amp; المنتقلون"
mp_qual3_d: "سواء كنت تنتقل من الفوترة اليدوية أو جداول البيانات أو نظام قديم، فإن عملية الانضمام سريعة ومصحوبة بإرشاد كامل."
mp_why_h: "لماذا BigLedger للفوترة الإلكترونية في ماليزيا"
mp_why_sub: "أحد 16 مزوّدًا معتمدًا فقط من MDEC — والوحيد الذي يمنحك مهلة كاملة مدتها 3 سنوات بمعدل 200 معاملة شهريًا."
mp_why1_t: "اعتماد كامل من MDEC"
mp_why1_d: "مزوّد خدمة PEPPOL معتمد لدى MDEC، الهيئة الماليزية المسؤولة عن Peppol. ومدرج في الدليل الرسمي لشركاء الفوترة الإلكترونية لدى MDEC."
mp_why2_t: "مبني خصيصًا لماليزيا"
mp_why2_d: "دعم أصلي لـ LHDN MyInvois وSST وEPF وSOCSO وPDPA وتكاملات البنوك المحلية — لا منتج أجنبي معدَّل لاحقًا."
mp_why3_t: "توسّع عندما تكون جاهزًا"
mp_why3_d: "تجاوزت 200 معاملة شهريًا؟ انتقل إلى منظومة ERP الكاملة من BigLedger: المحاسبة وPOS والمخزون والتجارة الإلكترونية وCRM — كلها على منصة واحدة."
mp_sup_h: "خدمات الدعم المشمولة"
mp_sup_sub: "تحصل كل شركة مشتركة في عرض MDEC على حزمة دعم BigLedger الكاملة — دون أي تكلفة إضافية. فنحن لا نترككم تواجهون متطلبات الامتثال وحدكم."
mp_sup1_t: "دعم الانضمام"
mp_sup1_d: "إعداد موجَّه مع أخصائي انضمام مخصص: ملف الشركة، وربط بيانات اعتماد LHDN MyInvois، وتسجيل معرّف Peppol في دليل SMP، وربط دليل الحسابات، وأول فاتورة اختبارية — ويكتمل ذلك عادةً خلال 3 أيام عمل."
mp_sup2_t: "المساندة التقنية"
mp_sup2_d: "المساعدة في تكامل API، وربط البيانات بحقول UBL 2.1 / PINT MY، ومعالجة حالات رفض التحقق لدى LHDN، واستثناءات التسليم عبر Peppol، وإعداد webhook/SFTP — يتولاها فريق الهندسة لدى BigLedger في ماليزيا."
mp_sup3_t: "التدريب"
mp_sup3_d: "جلسات تدريب مباشرة عبر الإنترنت لفريقي المالية والعمليات لديك، ودروس فيديو عند الطلب، وأدلة استخدام خطوة بخطوة، وبطاقات مرجعية سريعة — جميعها بالإنجليزية والملايوية والماندرين."
mp_sup4_t: "مكتب المساعدة"
mp_sup4_d: "مكتب مساعدة متعدد القنوات: البريد الإلكتروني <a href=\"mailto:support@bigledger.com\">support@bigledger.com</a>، ونظام التذاكر داخل التطبيق، وTelegram، وWhatsApp. الرد خلال ساعات العمل في غضون 4 ساعات عمل؛ وتصعيد الحالات الحرجة على مدار 24/7."
mp_sup5_t: "قاعدة المعرفة &amp; التوثيق"
mp_sup5_d: "توثيق عام كامل على <a href=\"https://wiki.bigledger.com/\" target=\"_blank\" rel=\"noopener\">wiki.bigledger.com</a>، يشمل أدلة الامتثال لـ LHDN، وإعدادات Peppol، ومراجع API، والأسئلة الشائعة. ويجري تحديثه باستمرار مع صدور قواعد جديدة عن LHDN وMDEC."
mp_sup6_t: "تحديثات امتثال مستمرة"
mp_sup6_d: "يحدّث BigLedger تلقائيًا المخططات وقواعد التحقق وقوالب المستندات كلما نشرت LHDN أو MDEC أي تغييرات — لتبقى ممتثلًا دون أي جهد منك."
mp_claim_h: "كيف تحصل على باقة الفوترة الإلكترونية المجانية"
mp_claim_sub: "ثلاث خطوات بسيطة نحو الامتثال — معظم الشركات تبدأ التشغيل خلال أسبوع."
mp_claim1_t: "تواصل معنا"
mp_claim1_d: "تواصل معنا عبر Telegram <a href=\"https://t.me/leehongfay\" target=\"_blank\" rel=\"noopener\"><strong>@leehongfay</strong></a> أو بالبريد الإلكتروني <a href=\"mailto:sales@bigledger.com\"><strong>sales@bigledger.com</strong></a>. واذكر عرض MDEC الترويجي."
mp_claim2_t: "انضمام سريع"
mp_claim2_d: "سنتحقق من بيانات شركتك، وننشئ ملفها التعريفي، ونضبط معك بيانات اعتماد LHDN MyInvois."
mp_claim3_t: "ابدأ إصدار الفواتير الإلكترونية"
mp_claim3_d: "أصدر أول فاتورة إلكترونية متوافقة في اليوم نفسه. مجانًا حتى 200 معاملة شهريًا، ولمدة 3 سنوات كاملة."
mp_faq_h: "الأسئلة الشائعة"
mp_faq1_q: "هل هذا العرض مجاني فعلاً؟ وهل هناك رسوم خفية؟"
mp_faq1_a: "نعم، مجاني تمامًا لمدة 3 سنوات لما يصل إلى 200 معاملة فوترة شهريًا. دون رسوم إعداد ودون الحاجة إلى بطاقة ائتمان. ويأتي ذلك ضمن التزام BigLedger في إطار المبادرة الوطنية للفوترة الإلكترونية من MDEC لمساعدة الشركات الماليزية الصغيرة والمتوسطة على تبنّي الفوترة الإلكترونية."
mp_faq2_q: "ما الذي يُحتسب معاملة؟"
mp_faq2_a: "المعاملة الواحدة = فاتورة أو إشعار دائن أو إشعار مدين واحد تم إرساله بنجاح إلى بوابة MyInvois التابعة لـ LHDN. أما المسودات وعمليات التحقق وإعادة إرسال المستند نفسه فلا تُحتسب."
mp_faq3_q: "ماذا يحدث بعد 3 سنوات، أو إذا تجاوزت 200 معاملة شهريًا؟"
mp_faq3_a: "يمكنك الترقية بسلاسة إلى إحدى باقات BigLedger المدفوعة بالأسعار القياسية. وتنتقل بياناتك وإعداداتك وسجلاتك معك — دون الحاجة إلى أي عملية ترحيل."
mp_faq4_q: "هل يشمل ذلك الفوترة العابرة للحدود عبر PEPPOL؟"
mp_faq4_a: "نعم. BigLedger نقطة وصول Peppol معتمدة من MDEC بقدرة إرسال واستقبال رباعية الأركان كاملة، بحيث يمكنك إصدار الفواتير واستقبالها عبر شبكة Peppol الدولية ضمن حصتك البالغة 200 معاملة شهريًا."
mp_faq5_q: "هل يستطيع BigLedger إرسال الفواتير واستقبالها عبر Peppol؟"
mp_faq5_a: "نعم — يشغّل BigLedger نقطة وصول Peppol رباعية الأركان كاملة. <strong>الإرسال:</strong> إصدار الفواتير والإشعارات الدائنة والمدينة والفواتير ذاتية الإصدار وإشعارات الاسترداد بتنسيق UBL 2.1 / PINT MY إلى LHDN MyInvois وإلى أي طرف على شبكة Peppol حول العالم. <strong>الاستقبال:</strong> قبول الفواتير الواردة والإشعارات الدائنة والمدينة وأوامر الشراء والردود عليها وإشعارات الشحن من أي نقطة وصول Peppol، مع تحقق تلقائي وتغذية راجعة بـ MLR ومطابقة آلية مع الحسابات الدائنة."
mp_faq6_q: "ما الدعم الذي أحصل عليه أثناء الانضمام وبعده؟"
mp_faq6_a: "يشمل العرض حزمة دعم BigLedger الكاملة دون تكلفة إضافية: أخصائي انضمام مخصص (التشغيل الفعلي عادةً خلال 3 أيام عمل)، ومساندة تقنية من فريق الهندسة لدينا في ماليزيا، وتدريب مباشر وعند الطلب بالإنجليزية والملايوية والماندرين، ومكتب مساعدة متعدد القنوات (البريد الإلكتروني، وداخل التطبيق، وTelegram، وWhatsApp) مع رد خلال 4 ساعات في أوقات العمل وتصعيد للحالات الحرجة على مدار 24/7، إضافة إلى تحديثات امتثال تلقائية كلما نشرت LHDN أو MDEC قواعد جديدة."
mp_faq7_q: "هل يمكنني ربط نظامي المحاسبي الحالي؟"
mp_faq7_a: "بالتأكيد. يوفر BigLedger واجهات REST API واستيرادًا دفعيًا عبر SFTP وخيارات رفع بصيغتي CSV/Excel. كما تتوفر التكاملات الشائعة جاهزة من البداية."
mp_faq8_q: "هل تُخزَّن بياناتي في ماليزيا؟"
mp_faq8_a: "نعم. يستضيف BigLedger البيانات في مراكز بيانات ماليزية، بما يتوافق مع PDPA وقواعد الاحتفاظ لمدة 7 سنوات لدى LHDN."
mp_faq9_q: "كيف أتحقق من أن BigLedger جزء رسمي من مبادرة MDEC؟"
mp_faq9_a: "BigLedger مدرج ضمن الـ16 مزوّدًا معتمدًا على <a href=\"https://www.mdec.my/national-einvoicing/freemium-and-affordable-solutions\" target=\"_blank\" rel=\"noopener\">صفحة MDEC للحلول المجانية &amp; الميسورة</a>."
mp_test_h: "بيئة الاختبار &amp; الوصول التجريبي"
mp_test_sub: "لمراجعي MDEC والشركاء المعتمدين والعملاء المحتملين الراغبين في التحقق من قدرة الإرسال والاستقبال عبر Peppol قبل الالتزام."
mp_test1_tag: "بيئة اختبار · للمختبِرين الخارجيين"
mp_test1_t: "اطلب وصولاً تجريبيًا"
mp_test1_d: "هل ترغب في اختبار بيئة ما قبل الإنتاج لدى BigLedger / akaun.com؟ أرسل لنا استفسارك وسنتولى إعداد حسابك بأنفسنا."
mp_test1_btn: "اطلب وصولاً تجريبيًا"
mp_test2_tag: "اختبار Peppol"
mp_test2_d: "يشغّل BigLedger نقطة وصول Peppol مخصصة لما قبل الإنتاج متصلة بـ SMP/SML الاختباري لـ OpenPeppol، وتُستخدم لاعتماد MDEC واختبارات مطابقة الشركاء."
mp_test2_t: "بيئة اختبار Peppol"
mp_test2_1: "تفعيل دوري <strong>المرسِل</strong> و<strong>المستقبِل</strong> معًا"
mp_test2_2: "أنواع المستندات: فاتورة، إشعار دائن، إشعار مدين، فاتورة ذاتية الإصدار، أمر شراء، رد على أمر الشراء، إشعار شحن"
mp_test2_3: "الملفات التعريفية: Peppol BIS Billing 3.0، وPeppol PINT MY (ماليزيا)"
mp_test2_4: "دعم MLR (استجابة على مستوى الرسالة) وتقارير المطابقة"
mp_test2_note: "<strong>يُصدَر معرّف PEPPOL الاختباري لاختبارات المطابقة مع MDEC</strong> لكل جهة طالبة على حدة. على مراجعي MDEC مراسلتنا على <a href=\"mailto:support@bigledger.com?subject=MDEC%20Peppol%20Test%20ID%20Request\">support@bigledger.com</a> أو التواصل مع <a href=\"https://t.me/leehongfay\" target=\"_blank\" rel=\"noopener\">@leehongfay</a> عبر Telegram، وسنشارك معرّف Peppol الاختباري الفعّال ونقطة نهاية SMP وأدلة المطابقة في يوم العمل نفسه."
mp_test_cta1: "اطلب وصولاً اختباريًا"
mp_final_h: "جاهز للامتثال — مجانًا؟"
mp_final_sub: "انضم إلى المبادرة الوطنية للفوترة الإلكترونية من MDEC مع BigLedger. 200 معاملة شهريًا، و3 سنوات مجانية، وامتثال كامل لـ MyInvois &amp; PEPPOL."
mp_final_hours: "الاثنين–الجمعة، 9:00 صباحًا – 6:00 مساءً بتوقيت ماليزيا MYT · الرد عادةً خلال ساعات قليلة"

