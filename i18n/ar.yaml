ei_proc1_n: "التقييم"
ei_proc1_d: "تحليل العمليات الحالية، وتحديد متطلبات التكامل، ومراجعة جودة البيانات، وتحليل فجوات الامتثال."
ei_proc2_w: "الأسبوع 2-3"
ei_proc2_n: "الإعداد"
ei_proc2_d: "تهيئة النظام، وترحيل البيانات الرئيسية، وضبط القواعد الضريبية، وتخصيص قوالب الفواتير."
ei_proc3_w: "الأسبوع 4-5"
ei_proc3_n: "التكامل"
