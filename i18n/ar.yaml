price_faq_title: "أسئلة شائعة"
price_faq1_q: "هل هناك نسخة تجريبية مجانية؟"
price_faq1_a: "نعم. نقدم فترة تجريبية كاملة الميزات حتى تتمكن من التحقق من BigLedger مقابل سير عملك الحقيقي قبل الالتزام. تواصل مع فريقنا لترتيب الوصول."
price_faq2_q: "هل يمكنني توسيع باقتي أو تقليصها؟"
price_faq2_a: "بالتأكيد. صُممت الباقات لتنمو معك — أضف وحدات أو مستخدمين أو سعة معاملات مع توسع أعمالك. كما أن تقليص الحجم مدعوم بالقدر نفسه."
price_faq3_q: "ما طرق الدفع المقبولة؟"
price_faq3_a: "نقبل Visa وMastercard وAmex والتحويل المصرفي والدفع عبر الإنترنت FPX. تأتي العقود السنوية بخصم جوهري مقارنة بالفوترة الشهرية."
price_faq4_q: "هل بياناتي آمنة ومخزّنة في ماليزيا؟"
price_faq4_a: "نعم. تُخزَّن جميع البيانات في مراكز بيانات ماليزية، ومشفّرة أثناء التخزين والنقل، مع بنية تحتية معتمدة وفق ISO 27001 ونسخ احتياطي تلقائي يومي."
price_faq5_q: "ماذا عن التدريب والإعداد؟"
price_faq5_a: "تشمل جميع الباقات وثائق ودروسًا مصوّرة وفريق إعداد مخصصًا. تتوفر جلسات تدريب مخصصة والمساعدة في ترحيل البيانات بناءً على مستوى باقتك."
