dev_eyebrow: "منصة المطورين"
dev_hero_h1: "ابنِ على"
dev_hero_h2: "نظام تشغيل الأعمال"
dev_hero_sub: "واجهات REST API شاملة، وخطافات webhook، وإطار عمل applet قابل للتوسيع — كل ما تحتاجه لدمج الأنظمة الحالية، وأتمتة سير العمل، وبناء وحدات خاصة بقطاعك على قمة BigLedger."
dev_qs_label: "بداية سريعة"
dev_qs_title: "من الصفر إلى التكامل في دقائق"
dev_qs_desc: "واجهة BigLedger API من نوع RESTful، أصلية بصيغة JSON، وموثّقة بأمثلة تفاعلية في كل لغة مهمة."
dev_step1_t: "اطلب وصول API"
dev_step1_d: "تواصل مع فريق المطورين لدينا لتلقّي بيانات اعتمادك، ووثائق نقاط النهاية، وبيئة اختبار محمّلة مسبقًا ببيانات تجريبية."
dev_step1_link: "اطلب الوصول"
dev_step2_t: "استكشف مرجع API"
dev_step2_d: "وثائق REST API كاملة مع عيّنات أكواد بلغات JavaScript وPython وPHP وJava و.NET وGo. تعمل الأمثلة التفاعلية مباشرة في المتصفح."
dev_step2_link: "عرض وثائق API"
dev_step3_t: "ابنِ وانشر"
dev_step3_d: "استخدم حزم SDK الرسمية لدينا، أو اشترك في خطافات webhook للأحداث الفورية، أو ابنِ applet مخصصًا بالكامل يعمل أصليًا داخل واجهة BigLedger."
dev_step3_link: "اقرأ الدليل"
dev_res_label: "الموارد"
dev_res_title: "كل ما تحتاجه للبناء"
dev_res1_t: "مرجع REST API"
dev_res1_d: "وثائق نقاط النهاية الكاملة مع مخططات الطلب/الاستجابة، وأدلة المصادقة، وتفاصيل حدود المعدل."
dev_res2_t: "حزم SDK الرسمية"
dev_res2_d: "مكتبات عملاء آمنة الأنواع لـ JavaScript/TypeScript وPython وPHP وJava و.NET وGo — يصونها ويختبرها فريقنا."
dev_res3_t: "خطافات Webhook"
dev_res3_d: "إشعارات أحداث فورية لإنشاء الفواتير، وتغييرات المخزون، وتحديثات الطلبات، ومعالجة المدفوعات، وأحداث الأعمال المخصصة."
dev_res3_tags: "HTTPS · منطق إعادة المحاولة · التوقيعات"
dev_res4_t: "Applets مخصصة"
dev_res4_d: "ابنِ وحدات خاصة بقطاعك، أو سير عمل مخصصًا، أو حلولًا بعلامة بيضاء تعمل أصليًا داخل واجهة BigLedger."
dev_res5_t: "الدروس والأدلة"
dev_res5_d: "شروحات خطوة بخطوة لتكامل التجارة الإلكترونية، وأتمتة E-Invoice، ومزامنة المحاسبة، وتطوير applet مخصص."
dev_res5_tags: "فيديو · مكتوب · تفاعلي"
dev_res6_t: "بيئة الاختبار"
dev_res6_d: "بيئة اختبار معزولة بالكامل محمّلة مسبقًا ببيانات نموذجية — طوّر واختبر دون المساس بأنظمة الإنتاج."
dev_res6_tags: "تكافؤ كامل مع API · إعادة التعيين في أي وقت"
dev_uc_label: "حالات الاستخدام"
dev_uc_title: "ما يمكنك بناؤه"
dev_col1_t: "مشاريع التكامل"
dev_uc1_n: "تكاملات التجارة الإلكترونية"
dev_uc1_s: "اربط Shopify أو WooCommerce أو واجهات المتاجر المخصصة لمزامنة الطلبات والمخزون في الوقت الفعلي."
dev_uc2_n: "اتصالات بوابات الدفع"
dev_uc2_s: "ادمج Stripe وFPX والبنوك المحلية ومعالجات الدفع الإقليمية مع تسوية آلية."
dev_uc3_n: "مزامنة الأسواق"
dev_uc3_s: "مزامنة ثنائية الاتجاه مع Lazada وShopee وAmazon وTikTok Shop — الطلبات والمخزون والتنفيذ."
dev_col2_t: "Applets مخصصة"
dev_uc4_n: "وحدات خاصة بالقطاع"
dev_uc4_s: "الرعاية الصحية والإنشاءات والسيارات — ابنِ سير عمل خاصًا بالقطاع ضمن إطار عمل BigLedger."
dev_uc5_n: "سير عمل مخصص"
dev_uc5_s: "عمليات الموافقة، والعمليات متعددة الخطوات، والتقارير المتخصصة المصممة وفق قواعد أعمالك."
dev_uc6_n: "حلول بعلامة بيضاء"
dev_uc6_s: "ابنِ applets بعلامتك التجارية لعملائك، قابلة للتوزيع عبر سوق BigLedger."
dev_col3_t: "الأتمتة"
dev_uc7_n: "سير عمل مدفوع بالأحداث"
dev_uc7_s: "تُطلَق مشغّلات webhook عند أي حدث عمل — أتمِت الحسابات الدائنة أو المخزون أو الامتثال أو الإشعارات."
dev_uc8_n: "معالجة البيانات المجمّعة"
dev_uc8_s: "تعامل مع عمليات الاستيراد والتصدير وترحيل البيانات واسعة النطاق عبر واجهات API للمعالجة الدفعية."
dev_uc9_n: "عمليات مجدولة"
dev_uc9_s: "تقارير آلية، وإيداعات تنظيمية، ولقطات مخزون، ومهام صيانة وفق جدولك."
dev_cta_label: "ابدأ البناء"
dev_cta_h: "احصل على بيانات اعتماد API<br>وابدأ البناء اليوم."
dev_cta_sub: "اطلب وصول بيئة الاختبار وسنجعلك تجري استدعاءات API خلال ساعة. وثائق كاملة ودعم SDK مضمّنان."
