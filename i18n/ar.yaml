price_incl_desc: "سواء كنت بائع تجزئة بمنفذ واحد أو مؤسسة متعددة الكيانات، فإن هذه الإمكانات تأتي بشكل قياسي مع كل عملية نشر لـ BigLedger."
price_incl1_t: "وصول كامل للميزات"
price_incl1_d: "وصول كامل إلى جميع الوحدات والميزات في باقتك — لا شيء محجوب خلف الإضافات."
price_incl2_t: "الامتثال لمتطلبات ماليزيا"
price_incl2_d: "E-Invoice وPEPPOL وSST وEPF وSOCSO وPCB — مدمجة بالكامل ومحدثة دائمًا."
price_incl3_t: "البنية التحتية السحابية"
price_incl3_d: "اتفاقية مستوى خدمة SLA بوقت تشغيل 99.9%، ونسخ احتياطي تلقائي، ومراكز بيانات ماليزية بتشفير بمستوى البنوك."
price_incl4_t: "الوصول عبر الجوال"
price_incl4_d: "تطبيقات iOS وAndroid الأصلية مضمَّنة. تعمل أعمالك أينما كان فريقك."
price_incl5_t: "تحديثات منتظمة"
price_incl5_d: "الميزات الجديدة والتحديثات التنظيمية وتحسينات الأداء تُطلَق تلقائيًا — دون رسوم ترقية."
price_incl6_t: "الأمان والامتثال"
price_incl6_d: "بنية تحتية معتمدة وفق ISO 27001. التحكم في الوصول القائم على الأدوار. سجلات تدقيق على كل إجراء."
price_cq_label: "عرض سعر مخصص"
price_cq_h: "أسعار مبنية حول<br>احتياجاتك الفعلية"
price_cq_p1: "نحن لا نبيعك ترخيص مؤسسات ضخمًا في حين أن ما تحتاجه فعلًا هو نشر مركّز. كل عرض سعر من BigLedger مبني حول ما تستخدمه أعمالك — لا ما يريد المورّد بيعه لك."
price_cq_p2: "تحدث إلى فريقنا واحصل على عرض سعر واضح ومفصّل خلال 24 ساعة. لا ضغط، ولا محادثات ارتباط طويلة الأمد — فقط أسعار شفافة للمنصة التي تستحقها أعمالك."
price_pf_title: "يستند عرض سعرك إلى"
