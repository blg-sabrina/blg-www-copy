home_hero_sub: "منصة سحابية واحدة مدعومة بالذكاء الاصطناعي توحّد المالية والمخزون والتجارة والموارد البشرية والامتثال. أكثر من 100 وحدة قابلة للتركيب. صُممت لجنوب شرق آسيا."
