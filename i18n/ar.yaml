price_eyebrow: "الأسعار"
price_hero_h: "شفافة. مرنة.<br>مصممة لأعمالك."
price_hero_sub: "لا رسوم لكل مستخدم. لا وحدات مخفية. لا مفاجآت. تُخصَّص أسعار BigLedger لتناسب أعمالك بالضبط — الوحدات التي تحتاجها، والحجم الذي تعمل به، ومستوى الدعم الذي تتطلبه."
price_incl_label: "كل باقة تشمل"
