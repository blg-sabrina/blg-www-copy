home_platform_label: "المنصة"
home_platform_title: "كل وظيفة. نظام واحد."
home_platform_desc: "وحدات قابلة للتركيب تعمل بشكل مستقل أو كنظام تشغيل موحّد للأعمال. فعّل ما تحتاجه الآن، وتوسّع عندما تكون جاهزًا."
home_mod_fin_name: "الإدارة المالية"
home_mod_fin_desc: "دفتر أستاذ عام متعدد الكيانات، الذمم المدينة والدائنة، التسوية البنكية، وإرسال الفواتير الإلكترونية إلى LHDN تلقائيًا مع سجل تدقيق كامل."
home_mod_pos_name: "نقاط البيع والتجارة"
home_mod_pos_desc: "نقاط بيع تعمل دون اتصال، وتكاملات متعددة القنوات مع Shopify وLazada وShopee. مخزون موحّد عبر جميع القنوات."
home_mod_bi_name: "ذكاء الأعمال"
home_mod_bi_desc: "تحليلات مدعومة بالذكاء الاصطناعي مع تنبؤات المبيعات والمخزون والتدفق النقدي. لوحات معلومات فورية عبر جميع الوحدات."
home_mod_mfg_name: "التصنيع والإنتاج"
home_mod_mfg_desc: "قوائم المواد، جدولة الإنتاج، مراقبة أرضية المصنع، فحص الجودة، وتكامل كامل مع تخطيط متطلبات المواد (MRP)."
home_mod_inv_name: "المخزون والمستودعات"
home_mod_inv_desc: "مراقبة المخزون متعدد المواقع مع تتبع تسلسلي ودفعات، دعم الباركود وRFID، وأتمتة إعادة الطلب بالذكاء الاصطناعي."
home_mod_crm_name: "المبيعات وإدارة علاقات العملاء"
home_mod_crm_desc: "إدارة علاقات عملاء معززة بالذكاء الاصطناعي مع رؤى تنبؤية، وأتمتة مسار المبيعات، وحملات تسويقية."
home_mod_einv_name: "الفاتورة الإلكترونية والامتثال"
home_mod_einv_desc: "اعتماد MDEC PEPPOL، تكامل مباشر مع MyInvois API، تقديم SST، وإرسال تلقائي إلى LHDN مع حالة فورية."
home_mod_hr_name: "الموارد البشرية والرواتب"
home_mod_hr_desc: "إدارة شاملة للقوى العاملة مع الامتثال لـ EPF وSOCSO وPCB، وتتبع الإجازات، ومعالجة الرواتب تلقائيًا."
home_mod_proj_name: "إدارة المشاريع"
home_mod_proj_desc: "تتبع مشاريع متعددة، جدولة الموارد، الفوترة المرحلية، تكلفة الأعمال، وإدارة المقاولين من الباطن في شاشة واحدة."
