ei_tl3_desc: "كل مكلّف متبقٍّ، بما في ذلك المنشآت الصغيرة والمتوسطة والمتناهية الصغر"
ei_stat1: "فاتورة تُعالَج في الساعة"
ei_stat2: "انخفاض في زمن معالجة الفواتير"
ei_stat3: "اتفاقية مستوى خدمة لزمن التشغيل"
ei_stat4: "الاحتفاظ بالأرشيف، بامتثال افتراضي"
ei_pp_label: "اعتماد PEPPOL"
ei_pp_h: "شبكة دولية،<br>لا حل محلي مؤقت"
ei_pp_p1: "يتيح معيار PEPPOL (الشبكة الأوروبية للمشتريات العامة عبر الإنترنت) للمنشآت تبادل المستندات الإلكترونية بسلاسة عبر الحدود. والاعتماد ليس شارة اشتريناها — بل وضع خاضع للتدقيق يحكم كيفية التحقق من المستندات وتوقيعها وتسليمها نيابة عنك."
ei_pp_p2: "يحمل BigLedger اعتمادًا كاملًا من مؤسسة الاقتصاد الرقمي الماليزية (MDEC)، ما يجعلنا مسارًا معتمدًا إلى السوق للمنشآت الماليزية التي تستعد للفوترة الإلكترونية الإلزامية، وللشركات الدولية التي تتعامل مع كيانات ماليزية، وللجهات الحكومية التي تشترط معاملات متوافقة مع PEPPOL، وللمنشآت الصغيرة والمتوسطة التي تحتاج إلى طريق ميسور التكلفة نحو الامتثال."
ei_pp_a1_n: "الامتثال"
ei_pp_a1_d: "التزام كامل بمعايير الفوترة الإلكترونية الدولية، ويُحدَّث باستمرار مع تغيّرها"
ei_pp_a2_n: "قابلية التشغيل البيني"
ei_pp_a2_d: "تبادل المستندات مع الشركاء التجاريين حول العالم على الشبكة نفسها، دون إعداد ثنائي مع كل طرف"
ei_pp_a3_n: "الأمان"
ei_pp_a3_d: "إرسال مشفّر ومُتحقَّق منه مع إثبات موقّع لما أُرسل ومتى أُرسل"
ei_pp_a4_n: "الموثوقية"
ei_pp_a4_d: "تسليم مضمون مع تأكيد استلام وإعادة محاولة تلقائية عند الإخفاق"
ei_cap_label: "قدرات المنصة"
