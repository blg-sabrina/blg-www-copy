home_ai_title: "ذكاء مدمج في كل قرار"
home_ai_desc: "ليس ميزة إضافية — الذكاء الاصطناعي منسوج في كل سير عمل. من لحظة وصول المستند إلى لحظة تحصيل الدفعة، تعمل طبقة الذكاء الاصطناعي في BigLedger بصمت لتقليل الأخطاء وتسريع القرارات وإبراز الرؤى."
home_ai_ocr_name: "معالجة المستندات OCR"
home_ai_ocr_desc: "استخراج بيانات الفواتير بدقة تتجاوز 99٪. دون أي إدخال يدوي."
